<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Pesquisa Acadêmica</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #222;
            color: #00d4ff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra Superior Estilizada */
        .header {
            background-color: #1a1a1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .search-container {
            flex-grow: 1;
            display: flex;
            gap: 8px;
        }

        input {
            flex-grow: 1;
            padding: 10px 15px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #00d4ff;
        }

        button {
            padding: 10px 20px;
            background: #00d4ff;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover {
            background: #00b8dd;
            transform: scale(1.02);
        }

        /* Container do Iframe */
        #content-frame {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #fff; /* Fundo branco para compatibilidade com sites externos */
        }

        .placeholder {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #222;
        }

        .placeholder h2 { margin-bottom: 10px; }
        .placeholder p { color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">WEB<span>CORE</span></div>
        <div class="search-container">
            <input type="text" id="url-input" placeholder="Digite uma URL ou pesquise algo..." autocomplete="off">
            <button onclick="nav()">ACESSAR</button>
        </div>
    </div>

    <div id="main-view" style="flex-grow: 1; display: flex; flex-direction: column;">
        <div id="home-screen" class="placeholder">
            <h2>SISTEMA PRONTO</h2>
            <p>Insira o destino para iniciar a navegação segura.</p>
        </div>
        <iframe id="content-frame" style="display: none;"></iframe>
    </div>

    <script>
        const input = document.getElementById('url-input');
        const frame = document.getElementById('content-frame');
        const home = document.getElementById('home-screen');

        // Atalho para o Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') nav();
        });

        function nav() {
            let val = input.value.trim();
            if (!val) return;

            let targetUrl;
            
            // Lógica de Detecção: Se não tem ponto ou tem espaço, é pesquisa no Google
            if (!val.includes('.') || val.includes(' ')) {
                targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(val);
            } else {
                targetUrl = val.startsWith('http') ? val : 'https://' + val;
            }

            // Motor de Proxy (Utilizando serviço estável de terceiros)
            const proxyGate = "https://www.croxyproxy.com/_proxy/php?url=";
            
            home.style.display = 'none';
            frame.style.display = 'block';
            frame.src = proxyGate + encodeURIComponent(targetUrl);
        }
    </script>
</body>
</html>
