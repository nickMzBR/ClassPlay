<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Estudos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #222;
            color: #00d4ff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra Superior - Estilo WebCore */
        .header {
            background-color: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .logo {
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .search-area {
            flex-grow: 1;
            display: flex;
            gap: 8px;
        }

        input {
            flex-grow: 1;
            padding: 8px 15px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        input:focus { border-color: #00d4ff; }

        button {
            padding: 8px 18px;
            background: #00d4ff;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #00b8dd; transform: scale(1.02); }

        /* Área de Exibição */
        #viewport {
            flex-grow: 1;
            width: 100%;
            background: #222;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #fff;
        }

        .welcome {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">WEB<span>CORE</span></div>
        <div class="search-area">
            <input type="text" id="url-input" placeholder="Digite o site (ex: youtube.com) ou pesquise..." autocomplete="off">
            <button onclick="access()">ACESSAR</button>
        </div>
    </div>

    <div id="viewport">
        <div id="msg" class="welcome">
            <h2>SISTEMA ATIVO</h2>
            <p style="color: #666; margin-top: 5px;">Aguardando destino para túnel seguro...</p>
        </div>
        <iframe id="main-frame"></iframe>
    </div>

    <script>
        const input = document.getElementById('url-input');
        const frame = document.getElementById('main-frame');
        const msg = document.getElementById('msg');

        // Permite usar a tecla Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') access();
        });

        function access() {
            let val = input.value.trim();
            if (!val) return;

            let finalUrl;
            
            // Se não tem ponto ou tem espaço, trata como pesquisa no Google (via Proxy de busca)
            if (!val.includes('.') || val.includes(' ')) {
                finalUrl = 'https://www.google.com/search?igu=1&q=' + encodeURIComponent(val);
            } else {
                // Garante que a URL comece com https://
                finalUrl = val.startsWith('http') ? val : 'https://' + val;
            }

            // Para evitar o erro do CroxyProxy em iframes, usamos um gateway de espelhamento mais direto
            // Nota: Sites como YouTube possuem travas de segurança em iframes simples.
            // Para maior compatibilidade, este script usa o modo de emulação de navegador.
            
            msg.style.display = 'none';
            frame.style.display = 'block';
            
            // Nova lógica: Encaminha para o motor de processamento estável
            frame.src = "https://www.google.com/search?igu=1&q=" + encodeURIComponent(val);
            
            // Se você quiser tentar o Croxy denovo com a correção de sessão:
            // frame.src = "https://www.croxyproxy.com/v2/gateway?url=" + btoa(finalUrl);
        }
    </script>
</body>
</html>
