// ── STICKMAN HOOK ─────────────────────────────────────────────────────────────
ENGINES.stickmanHook = function(container) {
  const W=600,H=700;
  const c=makeCanvas(W,H,'#050510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let man,hook,hooks,score5,state,raf;
  function genHooks(){
    const hs=[];
    for(let i=0;i<30;i++) hs.push({x:80+Math.random()*(W-160),y:60+Math.random()*(H*0.6),r:14,used:false});
    return hs;
  }
  function reset(){
    hooks=genHooks();
    man={x:W/2,y:200,vx:3,vy:0};
    hook=null; score5=0; state='start';
  }
  function attach(){
    if(hook) {hook=null; return;}
    let best=null,bestD=120;
    for(const h of hooks){
      if(h.used) continue;
      const d=Math.hypot(h.x-man.x,h.y-man.y);
      if(d<bestD){bestD=d;best=h;}
    }
    if(best){hook=best;}
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);drawBg();startMsg(ctx,W,H,'STICKMAN HOOK','Clique / ESPAÇO para agarrar');return;}
    if(state==='dead'){ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);drawBg();gameOver(ctx,W,H,score5,reset);return;}
    if(hook){
      const dx=hook.x-man.x, dy=hook.y-man.y;
      const dist=Math.hypot(dx,dy);
      const tx=dx/dist, ty=dy/dist;
      // swing: apply perpendicular force
      man.vx+=tx*0.4; man.vy+=ty*0.4+0.1;
    } else {
      man.vy+=0.4;
    }
    man.x+=man.vx; man.y+=man.vy;
    man.vx*=0.99; man.vy*=0.99;
    if(man.x<0||man.x>W){man.vx*=-0.8;}
    if(man.y>H+50){state='dead';return;}
    if(man.y<60){
      // scroll up
      const shift=60-man.y+40;
      man.y+=shift;
      for(const h of hooks) h.y+=shift;
      score5+=Math.floor(shift);
      hooks=hooks.filter(h=>h.y<H+100);
      while(hooks.length<25) hooks.push({x:80+Math.random()*(W-160),y:-60+Math.random()*100,r:14,used:false});
    }
    // collect hooks
    for(const h of hooks){ if(!h.used&&Math.hypot(h.x-man.x,h.y-man.y)<18){h.used=true;score5+=50;}}
    drawBg();
  }
  function drawBg(){
    const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#050510');grad.addColorStop(1,'#0a0a20');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // hooks
    for(const h of hooks){
      ctx.fillStyle=h.used?'#333':'#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=h.used?0:8;
      ctx.beginPath(); ctx.arc(h.x,h.y,h.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }
    // rope
    if(hook){
      ctx.strokeStyle='rgba(0,212,255,.6)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(man.x,man.y); ctx.lineTo(hook.x,hook.y); ctx.stroke();
    }
    // stickman
    const mx=man.x,my=man.y;
    ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath();ctx.arc(mx,my-18,10,0,Math.PI*2);ctx.stroke(); // head
    ctx.beginPath();ctx.moveTo(mx,my-8);ctx.lineTo(mx,my+14);ctx.stroke(); // body
    ctx.beginPath();ctx.moveTo(mx,my+2);ctx.lineTo(mx-14,my+14);ctx.moveTo(mx,my+2);ctx.lineTo(mx+14,my+14);ctx.stroke(); // arms
    ctx.beginPath();ctx.moveTo(mx,my+14);ctx.lineTo(mx-10,my+30);ctx.moveTo(mx,my+14);ctx.lineTo(mx+10,my+30);ctx.stroke(); // legs
    hud(ctx,score5,null,W);
  }
  reset();
  const kd=e=>{if(e.code==='Space'){if(state==='start') state='play'; else if(state==='dead') reset(); else attach();e.preventDefault();}};
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') state='play'; else if(state==='dead') reset(); else attach();});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── DOODLE JUMP ───────────────────────────────────────────────────────────────
ENGINES.doodleJump = function(container) {
  const W=400,H=600;
  const c=makeCanvas(W,H,'#050510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let doodle,platforms3,score6,state,raf,camY;
  function genPlatforms(){
    const ps=[{x:W/2-40,y:H-60,w:80,h:14,type:'normal'}];
    for(let y=H-120;y>-500;y-=70+Math.random()*50){
      const w=60+Math.random()*50;
      ps.push({x:Math.random()*(W-w),y,w,h:14,type:Math.random()<.15?'move':'normal',vx:Math.random()<.5?1.5:-1.5});
    }
    return ps;
  }
  function reset(){
    doodle={x:W/2,y:H-80,vx:0,vy:0,w:32,h:36,onP:false};
    platforms3=genPlatforms(); score6=0; camY=0; state='start';
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'DOODLE JUMP','← → Mover');return;}
    if(state==='dead'){ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);gameOver(ctx,W,H,score6,reset);return;}
    if(keys['ArrowLeft']||keys['KeyA']) doodle.vx-=.4;
    if(keys['ArrowRight']||keys['KeyD']) doodle.vx+=.4;
    doodle.vx*=0.88;
    doodle.vy+=.4; doodle.x+=doodle.vx; doodle.y+=doodle.vy;
    doodle.x=((doodle.x%W)+W)%W;
    // platform collision
    for(const p of platforms3){
      if(p.type==='move'){p.x+=p.vx;if(p.x<0||p.x+p.w>W) p.vx*=-1;}
      const py2=p.y-camY;
      if(doodle.vy>0&&doodle.y+doodle.h>py2&&doodle.y+doodle.h<py2+p.h+10&&doodle.x+doodle.w>p.x&&doodle.x<p.x+p.w){
        doodle.vy=-15; doodle.onP=true;
      }
    }
    // scroll
    if(doodle.y-camY<H*.4){
      const delta=(H*.4-(doodle.y-camY));
      camY-=delta;
      score6+=Math.floor(delta*.5);
    }
    if(doodle.y-camY>H+100){state='dead';return;}
    // add platforms
    while(platforms3[platforms3.length-1].y>camY-100)
      platforms3.push({x:Math.random()*(W-80),y:platforms3[platforms3.length-1].y-70-Math.random()*50,w:70,h:14,type:'normal'});
    // draw
    ctx.fillStyle='#050510'; ctx.fillRect(0,0,W,H);
    for(const p of platforms3){
      const py2=p.y-camY;
      if(py2>H||py2<-20) continue;
      ctx.fillStyle=p.type==='move'?'#ff8800':'#00d4ff';
      ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=6;
      ctx.fillRect(p.x,py2,p.w,p.h); ctx.shadowBlur=0;
    }
    // doodle char
    const dy=doodle.y-camY;
    ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=10;
    ctx.fillRect(doodle.x,dy,doodle.w,doodle.h);
    ctx.fillStyle='#fff'; ctx.fillRect(doodle.x+8,dy+6,8,8);
    ctx.shadowBlur=0;
    hud(ctx,score6,null,W);
  }
  reset();
  const kd=e=>{
    if(e.code==='Space'){if(state==='start') state='play'; else if(state==='dead') reset();e.preventDefault();}
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') state='play'; else if(state==='dead') reset();});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── SPACE INVADERS ────────────────────────────────────────────────────────────
ENGINES.spaceInvaders = ENGINES.spaceShooter;
ENGINES.asteroids = function(container) {
  const W=700,H=500;
  const c=makeCanvas(W,H,'#000');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let ship2,asteroids3,bullets2,score7,lives2,state,raf,shootCD2;
  function reset(){
    ship2={x:W/2,y:H/2,vx:0,vy:0,angle:0,r:14};
    asteroids3=[];bullets2=[];score7=0;lives2=3;shootCD2=0;state='play';
    for(let i=0;i<6;i++) spawnAsteroid();
  }
  function spawnAsteroid(x,y,r){
    const sides=Math.floor(8+Math.random()*5);
    const pts=Array.from({length:sides},(_,i)=>{const a=i/sides*Math.PI*2;const d=(r||50)+Math.random()*30;return{x:Math.cos(a)*d,y:Math.sin(a)*d};});
    asteroids3.push({x:x||Math.random()*W,y:y||Math.random()*H,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,r:r||50+Math.random()*30,pts,angle:0,va:(.5+Math.random())*(Math.random()<.5?1:-1)*.02});
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'ASTEROIDS','← → Girar · ↑ Thrust · ESPAÇO Atirar');return;}
    if(state==='dead'){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);gameOver(ctx,W,H,score7,reset);return;}
    if(keys['ArrowLeft']||keys['KeyA']) ship2.angle-=0.06;
    if(keys['ArrowRight']||keys['KeyD']) ship2.angle+=0.06;
    if(keys['ArrowUp']||keys['KeyW']){ship2.vx+=Math.cos(ship2.angle)*.25;ship2.vy+=Math.sin(ship2.angle)*.25;}
    ship2.vx*=.98;ship2.vy*=.98;
    ship2.x=(ship2.x+ship2.vx+W)%W; ship2.y=(ship2.y+ship2.vy+H)%H;
    if((keys['Space']||keys['KeyZ'])&&shootCD2<=0){
      bullets2.push({x:ship2.x,y:ship2.y,vx:Math.cos(ship2.angle)*8,vy:Math.sin(ship2.angle)*8,life:60});
      shootCD2=15;
    }
    if(shootCD2>0) shootCD2--;
    bullets2.forEach(b=>{b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;b.life--;});
    bullets2=bullets2.filter(b=>b.life>0);
    asteroids3.forEach(a=>{a.x=(a.x+a.vx+W)%W;a.y=(a.y+a.vy+H)%H;a.angle+=a.va;});
    // bullet/asteroid
    for(const b of bullets2){
      for(const a of asteroids3){
        if(Math.hypot(b.x-a.x,b.y-a.y)<a.r*.8){
          b.life=0;a.r=-1;score7+=10;
          if(a.r>20){spawnAsteroid(a.x,a.y,a.r/2);spawnAsteroid(a.x,a.y,a.r/2);}
          break;
        }
      }
    }
    asteroids3=asteroids3.filter(a=>a.r>0);
    if(!asteroids3.length){for(let i=0;i<6+Math.floor(score7/200);i++) spawnAsteroid();}
    // ship/asteroid
    for(const a of asteroids3){if(Math.hypot(ship2.x-a.x,ship2.y-a.y)<a.r*.7+ship2.r){lives2--;if(lives2<=0)state='dead';else{ship2.x=W/2;ship2.y=H/2;ship2.vx=0;ship2.vy=0;}break;}}
    // draw
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,.3)';for(let i=0;i<80;i++) ctx.fillRect((i*73)%W,(i*137)%H,1.5,1.5);
    // asteroids
    asteroids3.forEach(a=>{
      ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
      ctx.strokeStyle='#aaa';ctx.lineWidth=2;ctx.beginPath();
      a.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
      ctx.closePath();ctx.stroke();ctx.restore();
    });
    // bullets
    bullets2.forEach(b=>{ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
    // ship
    ctx.save();ctx.translate(ship2.x,ship2.y);ctx.rotate(ship2.angle+Math.PI/2);
    ctx.strokeStyle='#00d4ff';ctx.lineWidth=2.5;ctx.shadowColor='#00d4ff';ctx.shadowBlur=10;
    ctx.beginPath();ctx.moveTo(0,-ship2.r);ctx.lineTo(-ship2.r*.7,ship2.r*.8);ctx.lineTo(0,ship2.r*.4);ctx.lineTo(ship2.r*.7,ship2.r*.8);ctx.closePath();ctx.stroke();
    if(keys['ArrowUp']||keys['KeyW']){ctx.fillStyle='#ff8800';ctx.shadowColor='#ff8800';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(0,ship2.r*.5,6,0,Math.PI*2);ctx.fill();}
    ctx.shadowBlur=0;ctx.restore();
    hud(ctx,score7,lives2,W);
  }
  state='start';
  const kd=e=>{
    if(state==='start'){reset();return;}
    if(state==='dead'){score7=0;reset();return;}
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') reset(); else if(state==='dead'){score7=0;reset();}});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── FROGGER ───────────────────────────────────────────────────────────────────
ENGINES.frogger = function(container) {
  const COLS2=14,ROWS2=13,SZ2=44;
  const W=COLS2*SZ2,H=ROWS2*SZ2;
  const c=makeCanvas(W,H,'#0a0a10');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const ROAD_ROWS=[2,3,4,5,6],RIVER_ROWS=[7,8,9,10];
  let frog,cars,logs,score8,lives3,state,raf;
  function reset(){
    frog={col:7,row:12};
    cars=ROAD_ROWS.flatMap(r=>Array.from({length:3},(_,i)=>({col:i*5-2+Math.random()*2,row:r,dir:r%2?1:-1,speed:.04+r*.008,w:1.8})));
    logs=RIVER_ROWS.flatMap(r=>Array.from({length:3},(_,i)=>({col:i*5-1,row:r,dir:r%2?1:-1,speed:.03+r*.005,w:2.5})));
    score8=0;lives3=3;state='play';
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#0a0a10';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'FROGGER','Setas para mover');return;}
    if(state==='dead'){ctx.fillStyle='#0a0a10';ctx.fillRect(0,0,W,H);drawScene();gameOver(ctx,W,H,score8,reset);return;}
    cars.forEach(car=>{car.col=(car.col+car.dir*car.speed+COLS2)%COLS2;});
    logs.forEach(log=>{log.col=(log.col+log.dir*log.speed+COLS2)%COLS2;});
    // on log
    if(RIVER_ROWS.includes(frog.row)){
      let onLog=false;
      for(const log of logs){
        if(log.row===frog.row&&frog.col>=log.col-.5&&frog.col<=log.col+log.w+.5){
          frog.col=(frog.col+log.dir*log.speed+COLS2)%COLS2; onLog=true; break;
        }
      }
      if(!onLog){lives3--;if(lives3<=0) state='dead'; else frog={col:7,row:12};}
    }
    // car collision
    for(const car of cars){if(car.row===frog.row&&Math.abs(frog.col-car.col-.9)<1.4){lives3--;if(lives3<=0) state='dead'; else frog={col:7,row:12};break;}}
    // win
    if(frog.row===0){score8+=100;frog={col:7,row:12};}
    drawScene();
  }
  function drawScene(){
    ctx.fillStyle='#0a0a10'; ctx.fillRect(0,0,W,H);
    // zones
    for(let r=0;r<ROWS2;r++){
      const y=r*SZ2;
      ctx.fillStyle=r===0||r===12?'#1a3a1a':ROAD_ROWS.includes(r)?'#1a1a1a':RIVER_ROWS.includes(r)?'#001a3a':'#1a2a1a';
      ctx.fillRect(0,y,W,SZ2);
    }
    // lane lines
    ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=1; ctx.setLineDash([20,20]);
    ROAD_ROWS.forEach(r=>{ctx.beginPath();ctx.moveTo(0,(r+1)*SZ2-2);ctx.lineTo(W,(r+1)*SZ2-2);ctx.stroke();});
    ctx.setLineDash([]);
    // logs
    logs.forEach(log=>{
      ctx.fillStyle='#5a3010'; ctx.shadowColor='#aa6020'; ctx.shadowBlur=6;
      ctx.fillRect(log.col*SZ2,log.row*SZ2+6,log.w*SZ2,SZ2-12); ctx.shadowBlur=0;
    });
    // cars
    cars.forEach(car=>{
      ctx.fillStyle='#ff3355'; ctx.shadowColor='#ff3355'; ctx.shadowBlur=8;
      ctx.fillRect(car.col*SZ2+2,car.row*SZ2+8,car.w*SZ2-4,SZ2-16); ctx.shadowBlur=0;
    });
    // frog
    ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(frog.col*SZ2+SZ2/2,frog.row*SZ2+SZ2/2,SZ2*.38,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    hud(ctx,score8,lives3,W);
  }
  reset(); state='start';
  const kd=e=>{
    if(state==='start'){state='play';return;}
    if(state==='dead'){score8=0;reset();return;}
    if(e.code==='ArrowUp'&&frog.row>0) frog.row--;
    if(e.code==='ArrowDown'&&frog.row<ROWS2-1) frog.row++;
    if(e.code==='ArrowLeft'&&frog.col>0) frog.col--;
    if(e.code==='ArrowRight'&&frog.col<COLS2-1) frog.col++;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') state='play'; else if(state==='dead'){score8=0;reset();}});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── WORD GUESS (Wordle) ───────────────────────────────────────────────────────
ENGINES.wordGuess = function(container) {
  const WORDS2=['JOGO','BOLA','CASA','AZUL','GATO','PATO','FOGO','NEON','COPA','VELA','RATO','TELA','LOBO','URSO','ILHA','OURO','NEVE','ROSA','METAL','PIXEL'];
  const TARGET2=WORDS2[Math.floor(Math.random()*WORDS2.length)];
  const MAXG2=6,WLEN2=TARGET2.length;
  const wrap2=document.createElement('div');
  wrap2.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:#050510;gap:14px;padding:16px';
  const titleEl=document.createElement('div');
  titleEl.style.cssText='font-family:Orbitron,monospace;font-size:1.1rem;color:#00d4ff;letter-spacing:.2em;text-shadow:0 0 10px rgba(0,212,255,.4)';
  titleEl.textContent='WORDLE';
  const grid3=document.createElement('div');
  grid3.style.cssText=`display:grid;grid-template-columns:repeat(${WLEN2},1fr);gap:8px;width:min(${WLEN2*56}px,88vw)`;
  const kb2=document.createElement('div');
  kb2.style.cssText='display:flex;flex-direction:column;gap:5px;align-items:center';
  const msgEl=document.createElement('div');
  msgEl.style.cssText='font-family:Rajdhani,sans-serif;color:#ffd700;font-size:.88rem;min-height:1.2em;text-align:center';
  wrap2.append(titleEl,grid3,kb2,msgEl);
  container.appendChild(wrap2);
  let guesses2=[],current2='',done2=false;
  const cells2=[];
  for(let r=0;r<MAXG2;r++) for(let col=0;col<WLEN2;col++){
    const d=document.createElement('div');
    d.style.cssText='aspect-ratio:1;border:2px solid rgba(0,212,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:Orbitron,monospace;font-size:1.3rem;font-weight:700;color:#eef4ff;background:#0d1a2a';
    cells2.push(d);grid3.appendChild(d);
  }
  const ROWS_KB2=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
  const kbMap2={};
  ROWS_KB2.forEach(row=>{
    const rowEl=document.createElement('div');rowEl.style.cssText='display:flex;gap:4px';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.textContent=k;
      btn.style.cssText=`background:#111a2a;border:1px solid rgba(0,212,255,.18);border-radius:6px;color:#eef4ff;font-family:Rajdhani,sans-serif;font-size:.82rem;font-weight:600;padding:7px ${k.length>1?'9':'7'}px;cursor:pointer;min-width:${k.length>1?46:32}px;transition:background .18s`;
      btn.onclick=()=>handleKey2(k);
      rowEl.appendChild(btn);if(k.length===1) kbMap2[k]=btn;
    });
    kb2.appendChild(rowEl);
  });
  function updateGrid2(){
    cells2.forEach((cell,i)=>{const r=Math.floor(i/WLEN2),col=i%WLEN2;
      if(r<guesses2.length){
        const g=guesses2[r],letter=g[col];
        let bg='#1a1a2a',bc='#1a1a2a';
        if(letter===TARGET2[col]){bg='rgba(0,255,136,.18)';bc='#00ff88';}
        else if(TARGET2.includes(letter)){bg='rgba(255,200,0,.15)';bc='#ffd700';}
        else{bg='rgba(80,80,100,.15)';bc='#333';}
        cell.style.background=bg;cell.style.borderColor=bc;cell.textContent=letter;
      } else if(r===guesses2.length){cell.textContent=current2[col]||'';cell.style.background='#0d1a2a';cell.style.borderColor=current2[col]?'rgba(0,212,255,.5)':'rgba(0,212,255,.2)';}
      else{cell.textContent='';cell.style.background='#0d1a2a';cell.style.borderColor='rgba(0,212,255,.1)';}
    });
  }
  function handleKey2(k){
    if(done2) return;
    if(k==='⌫'||k==='Backspace') current2=current2.slice(0,-1);
    else if(k==='ENTER'||k==='Enter'){
      if(current2.length<WLEN2){msgEl.textContent='Muito curta!';setTimeout(()=>msgEl.textContent='',1200);return;}
      guesses2.push(current2);
      current2.split('').forEach((l,i)=>{const btn=kbMap2[l];if(!btn)return;if(l===TARGET2[i]) btn.style.background='rgba(0,255,136,.3)';else if(TARGET2.includes(l)&&btn.style.background!=='rgba(0,255,136,.3)') btn.style.background='rgba(255,200,0,.2)';else if(!TARGET2.includes(l)) btn.style.background='#0a0a14';});
      if(current2===TARGET2){done2=true;msgEl.textContent='🎉 CORRETO!';}
      else if(guesses2.length>=MAXG2){done2=true;msgEl.textContent='A palavra era: '+TARGET2;}
      current2='';
    } else if(k.length===1&&current2.length<WLEN2) current2+=k.toUpperCase();
    updateGrid2();
  }
  const kd=e=>{if(e.key==='Escape') return;handleKey2(e.key==='Backspace'?'⌫':e.key==='Enter'?'ENTER':e.key.toUpperCase());if(['Enter',' '].includes(e.key)) e.preventDefault();};
  document.addEventListener('keydown',kd);
  updateGrid2();
  return()=>document.removeEventListener('keydown',kd);
};

  container.appendChild(wrap3);
  const CAMERAS=['Cam 1A','Cam 1B','Cam 2A','Cam 2B','Cam 3','Cam 4A','Cam 4B'];
  const ACTIONS=[{n:'Câmera Esq',e:'📷'},{n:'Câmera Dir',e:'📷'},{n:'Luz Esq',e:'💡'},{n:'Luz Dir',e:'💡'},{n:'Porta Esq',e:'🚪'},{n:'Porta Dir',e:'🚪'}];
  let hour=12,powerLevel=100,alive3=true,interval3;
  function update(){
    if(!alive3) return;
    powerLevel=Math.max(0,powerLevel-.15);
    hour+=.005;
    power.textContent=`⚡ ${Math.floor(powerLevel)}% | ${Math.min(Math.floor(hour),6)}AM`;
    if(powerLevel<=0||hour>=6){clearInterval(interval3);if(hour>=6){msg3.textContent='🌅 Você sobreviveu até 6AM! VOCÊ GANHOU!';msg3.style.color='#ffd700';}else{msg3.textContent='💡 Sem energia! GAME OVER';msg3.style.color='#ff3355';}alive3=false;}
    if(Math.random()<0.005){msg3.textContent=`⚠️ ${CAMERAS[Math.floor(Math.random()*CAMERAS.length)]}: Presença detectada!`;msg3.style.color='#ff8800';setTimeout(()=>{if(alive3) msg3.style.color='#888';},1500);}
  }
  ACTIONS.forEach(a=>{
    const btn=document.createElement('button');
    btn.style.cssText='background:rgba(255,68,0,.15);border:1px solid rgba(255,68,0,.3);border-radius:8px;color:#ff8844;font-family:Rajdhani,sans-serif;font-size:.85rem;font-weight:600;padding:.5rem 1rem;cursor:pointer;transition:all .15s;letter-spacing:.05em';
    btn.textContent=a.e+' '+a.n;
    btn.onmouseover=()=>btn.style.background='rgba(255,68,0,.25)';
    btn.onmouseout=()=>btn.style.background='rgba(255,68,0,.15)';
    btn.onclick=()=>{if(!alive3) return;powerLevel=Math.max(0,powerLevel-3);msg3.textContent=`🔦 Verificando ${a.n}...`;msg3.style.color='#888';};
    btns3.appendChild(btn);
  });
  msg3.textContent='Gerencie sua energia. Sobreviva até 6AM!';
  interval3=setInterval(update,100);
  return()=>clearInterval(interval3);
};

// ── AMONG IMPOSTOR ────────────────────────────────────────────────────────────
ENGINES.amongImpostor = function(container) {
  const W=600,H=500;
  const c=makeCanvas(W,H,'#0a0510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const CREWCOLORS=['#ff3355','#ff8800','#ffd700','#00ff88','#00d4ff','#aa44ff','#ff44aa','#fff'];
  let impostor4,crew,score9,state,raf;
  function drawAmong(x,y,col,r,isImpostor){
    const scl=r/20;
    ctx.fillStyle=col;
    ctx.shadowColor=col; ctx.shadowBlur=isImpostor?12:4;
    // body
    ctx.beginPath();ctx.ellipse(x,y+5*scl,14*scl,18*scl,0,0,Math.PI*2);ctx.fill();
    // head
    ctx.beginPath();ctx.ellipse(x,y-12*scl,12*scl,12*scl,0,0,Math.PI*2);ctx.fill();
    // visor
    ctx.fillStyle=isImpostor?'rgba(255,100,50,.7)':'rgba(150,220,255,.7)';
    ctx.beginPath();ctx.ellipse(x+2*scl,y-13*scl,7*scl,5*scl,-.3,0,Math.PI*2);ctx.fill();
    // backpack
    ctx.fillStyle=col;
    ctx.fillRect(x+10*scl,y-5*scl,8*scl,14*scl);
    ctx.shadowBlur=0;
  }
  function reset(){
    impostor4={x:W/2,y:H/2,r:22,vx:0,vy:0};
    crew=Array.from({length:8},()=>({x:50+Math.random()*(W-100),y:50+Math.random()*(H-100),r:18,col:CREWCOLORS[Math.floor(Math.random()*CREWCOLORS.length)],vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,alive:true}));
    score9=0;state='play';
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#0a0510';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'AMONG US','← → ↑ ↓ para mover · ESPAÇO para eliminar');return;}
    if(state==='dead'||state==='win'){ctx.fillStyle='#0a0510';ctx.fillRect(0,0,W,H);drawScene9();if(state==='dead') gameOver(ctx,W,H,score9,reset);else{ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffd700';ctx.font='bold 2rem Orbitron,monospace';ctx.textAlign='center';ctx.fillText('ELIMINADOS!',W/2,H/2-20);ctx.fillStyle='#7a92aa';ctx.font='.85rem Rajdhani,sans-serif';ctx.fillText('ESPAÇO para reiniciar',W/2,H/2+30);}return;}
    if(keys['ArrowLeft']||keys['KeyA']) impostor4.vx-=.4;
    if(keys['ArrowRight']||keys['KeyD']) impostor4.vx+=.4;
    if(keys['ArrowUp']||keys['KeyW']) impostor4.vy-=.4;
    if(keys['ArrowDown']||keys['KeyS']) impostor4.vy+=.4;
    impostor4.vx*=.85;impostor4.vy*=.85;
    impostor4.x=Math.max(22,Math.min(W-22,impostor4.x+impostor4.vx));
    impostor4.y=Math.max(22,Math.min(H-22,impostor4.y+impostor4.vy));
    // crew wander
    crew.forEach(cr=>{if(!cr.alive) return;cr.vx+=(Math.random()-.5)*.1;cr.vy+=(Math.random()-.5)*.1;cr.vx*=.98;cr.vy*=.98;cr.x=Math.max(20,Math.min(W-20,cr.x+cr.vx));cr.y=Math.max(20,Math.min(H-20,cr.y+cr.vy));});
    // kill
    if(keys['Space']){
      for(const cr of crew){if(cr.alive&&Math.hypot(cr.x-impostor4.x,cr.y-impostor4.y)<impostor4.r+cr.r+10){cr.alive=false;score9+=100;}}
    }
    if(crew.every(cr=>!cr.alive)) state='win';
    drawScene9();
  }
  function drawScene9(){
    const grad=ctx.createRadialGradient(impostor4.x,impostor4.y,20,impostor4.x,impostor4.y,200);
    grad.addColorStop(0,'#1a0530');grad.addColorStop(1,'#0a0510');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    crew.forEach(cr=>{if(!cr.alive){ctx.globalAlpha=.3;}drawAmong(cr.x,cr.y,cr.col,cr.r,false);ctx.globalAlpha=1;});
    drawAmong(impostor4.x,impostor4.y,'#ff3355',impostor4.r,true);
    hud(ctx,score9,null,W,crew.filter(cr=>cr.alive).length+' restantes');
  }
  reset();state='start';
  const kd=e=>{
    if(state==='start'){state='play';return;}
    if(state==='dead'||state==='win'){reset();return;}
    if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') state='play'; else if(state==='dead'||state==='win') reset();});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── RETRO BOWL ────────────────────────────────────────────────────────────────
ENGINES.retroBowl = function(container) {
  const W=600,H=400;
  const c=makeCanvas(W,H,'#0a1a0a');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:crosshair';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let qb,receivers,defenders,ball3,score10,quarter,state,raf,throwing,throwPower;
  function reset(){
    qb={x:W/2,y:H-60};
    receivers=Array.from({length:4},(_,i)=>({x:80+i*140,y:H-60,vx:0,vy:0,route:[{dx:0,dy:-200+Math.random()*100},{dx:(Math.random()-.5)*100,dy:0}],step:0,timer:0}));
    defenders=Array.from({length:3},(_,i)=>({x:80+i*200,y:200,vx:0,vy:0}));
    ball3=null;score10=0;quarter=1;state='aim';throwing=false;throwPower=0;
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'RETRO BOWL','Clique para lançar · Arraste para mirar');return;}
    // receivers run routes
    receivers.forEach(r=>{
      if(r.step<r.route.length){
        const target=r.route[r.step];
        r.vx+=(target.dx*.01-r.vx)*.15;
        r.vy+=(target.dy*.01-r.vy)*.15;
        r.x+=r.vx; r.y+=r.vy;
        r.timer++;if(r.timer>80){r.step++;r.timer=0;}
      }
    });
    // defenders chase nearest receiver
    defenders.forEach(d=>{
      let nearest=receivers[0];let bestD=999;
      receivers.forEach(r=>{const dd=Math.hypot(r.x-d.x,r.y-d.y);if(dd<bestD){bestD=dd;nearest=r;}});
      d.vx+=(nearest.x-d.x)*.002; d.vy+=(nearest.y-d.y)*.002;
      d.vx*=.95;d.vy*=.95;d.x+=d.vx;d.y+=d.vy;
    });
    // ball
    if(ball3){
      ball3.x+=ball3.vx;ball3.y+=ball3.vy;ball3.vy+=.2;
      // check catch
      for(const r of receivers){
        if(Math.hypot(r.x-ball3.x,r.y-ball3.y)<25){score10+=7;ball3=null;state='aim';receivers.forEach(r2=>{r2.x=80+receivers.indexOf(r2)*140;r2.y=H-60;r2.vx=0;r2.vy=0;r2.step=0;r2.timer=0;});break;}
      }
      // incomplete
      if(ball3&&(ball3.y>H||ball3.x<0||ball3.x>W)){ball3=null;state='aim';}
    }
    draw10();
  }
  function draw10(){
    // field
    const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#0a2a0a');grad.addColorStop(1,'#0a1a0a');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // yard lines
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // receivers
    receivers.forEach(r=>{ctx.fillStyle='#00d4ff';ctx.shadowColor='#00d4ff';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(r.x,r.y,12,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
    // defenders
    defenders.forEach(d=>{ctx.fillStyle='#ff3355';ctx.shadowColor='#ff3355';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(d.x,d.y,11,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
    // QB
    ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(qb.x,qb.y,14,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // ball
    if(ball3){ctx.fillStyle='#a0522d';ctx.shadowColor='#a0522d';ctx.shadowBlur=8;ctx.beginPath();ctx.ellipse(ball3.x,ball3.y,8,5,Math.atan2(ball3.vy,ball3.vx),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    // power meter
    if(throwing){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(10,H-30,200,14);ctx.fillStyle=`hsl(${120-throwPower*1.2},100%,50%)`;ctx.fillRect(10,H-30,throwPower*2,14);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(10,H-30,200,14);}
    hud(ctx,score10,null,W,'Q'+quarter);
  }
  let mouseX=0,mouseY=0;
  c.addEventListener('mousedown',e=>{
    if(state==='start'){state='aim';return;}
    const r=c.getBoundingClientRect();
    mouseX=(e.clientX-r.left)/r.width*W;
    mouseY=(e.clientY-r.top)/r.height*H;
    throwing=true;throwPower=0;
    const pi=setInterval(()=>{throwPower=Math.min(100,throwPower+2);},16);
    c.onmouseup=()=>{
      clearInterval(pi);throwing=false;
      const dx=mouseX-qb.x,dy=mouseY-qb.y;
      const dist=Math.hypot(dx,dy);
      const spd=3+throwPower*.1;
      ball3={x:qb.x,y:qb.y,vx:dx/dist*spd,vy:dy/dist*spd-4};
      c.onmouseup=null;
    };
  });
  reset();state='start';
  tick();
  return()=>{cancelAnimationFrame(raf);};
};

// ── BASKETBALL ───────────────────────────────────────────────────────────────
ENGINES.basketball = function(container) {
  const W=500,H=600;
  const c=makeCanvas(W,H,'#050510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:crosshair';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const HOOP={x:W/2,y:150,w:80,r:22};
  let ball4,score11,shots,state,raf,drag,dragStart;
  function reset(){ball4={x:W/2,y:H-80,r:22,vx:0,vy:0,spinning:false,inAir:false};score11=0;shots=0;state='play';drag=false;}
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);draw11();startMsg(ctx,W,H,'BASKETBALL','Arraste a bola para atirar');return;}
    if(!drag&&ball4.inAir){
      ball4.x+=ball4.vx; ball4.y+=ball4.vy; ball4.vy+=.35; ball4.vx*=.99;
      // backboard
      if(ball4.x>W-20){ball4.vx*=-.7;ball4.x=W-20-ball4.r;}
      if(ball4.x<20){ball4.vx*=-.7;ball4.x=20+ball4.r;}
      // floor
      if(ball4.y>H-30){ball4.vy*=-.6;ball4.vx*=.8;ball4.y=H-30-ball4.r;if(Math.abs(ball4.vy)<1){ball4.inAir=false;ball4.x=W/2;ball4.y=H-80;ball4.vx=0;ball4.vy=0;}}
      // score check - hoop
      if(Math.abs(ball4.x-HOOP.x)<HOOP.r+ball4.r*.5&&Math.abs(ball4.y-HOOP.y)<20&&ball4.vy>0){score11+=3;shots++;ball4.vy=2;ball4.vx*=.3;}
    }
    draw11();
  }
  function draw11(){
    const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#050510');grad.addColorStop(1,'#0a0520');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // court lines
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(W/2,H/2,120,0,Math.PI*2);ctx.stroke();
    // backboard
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(W-10,100,10,120);
    // hoop
    ctx.strokeStyle='#ff8800';ctx.lineWidth=5;ctx.shadowColor='#ff8800';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(HOOP.x,HOOP.y,HOOP.r,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    // net
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
    for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(HOOP.x-HOOP.r+i*HOOP.r*.4,HOOP.y);ctx.lineTo(HOOP.x-HOOP.r*.3+i*HOOP.r*.15,HOOP.y+50);ctx.stroke();}
    // ball
    const grad2=ctx.createRadialGradient(ball4.x-5,ball4.y-5,3,ball4.x,ball4.y,ball4.r);
    grad2.addColorStop(0,'#ff8800');grad2.addColorStop(1,'#c85000');
    ctx.fillStyle=grad2;ctx.shadowColor='#ff8800';ctx.shadowBlur=15;
    ctx.beginPath();ctx.arc(ball4.x,ball4.y,ball4.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='#000';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ball4.x-ball4.r,ball4.y);ctx.lineTo(ball4.x+ball4.r,ball4.y);ctx.stroke();
    // aim line
    if(drag&&dragStart){
      const dx=ball4.x-dragStart.x,dy=ball4.y-dragStart.y;
      ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.setLineDash([8,8]);
      ctx.beginPath();let tx=ball4.x,ty=ball4.y,tvx=dx*.15,tvy=dy*.15;
      for(let i=0;i<20;i++){ctx.lineTo(tx,ty);tx+=tvx;ty+=tvy;tvy+=.35;}
      ctx.stroke();ctx.setLineDash([]);
    }
    hud(ctx,score11,null,W,'SHOTS: '+shots);
  }
  reset();state='start';
  c.addEventListener('mousedown',e=>{
    if(state==='start'){state='play';return;}
    const r=c.getBoundingClientRect();
    const mx=(e.clientX-r.left)/r.width*W,my=(e.clientY-r.top)/r.height*H;
    if(!ball4.inAir&&Math.hypot(mx-ball4.x,my-ball4.y)<ball4.r+10){drag=true;dragStart={x:mx,y:my};}
  });
  c.addEventListener('mousemove',e=>{if(!drag) return;const r=c.getBoundingClientRect();dragStart={x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};});
  c.addEventListener('mouseup',e=>{
    if(!drag) return;
    const r=c.getBoundingClientRect();
    const mx=(e.clientX-r.left)/r.width*W,my=(e.clientY-r.top)/r.height*H;
    const dx=ball4.x-mx,dy=ball4.y-my;
    ball4.vx=dx*.15;ball4.vy=dy*.15;ball4.inAir=true;drag=false;dragStart=null;
  });
  tick();
  return()=>{cancelAnimationFrame(raf);};
};

// ═══════════════════════════════════════════════════════════
//  PORTAL UI
// ═══════════════════════════════════════════════════════════
let activeCat = 'Todos';
const cats2 = ['Todos', ...new Set(GAMES.map(g=>g.c))];
const catsEl2 = $('cats');
cats2.forEach(cat => {
  const b = document.createElement('button');
  b.className = 'cb' + (cat==='Todos'?' on':'');
  b.textContent = cat;
  b.onclick = () => {
    document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    activeCat = cat;
    render2();
  };
  catsEl2.appendChild(b);
});

function render2() {
  const q2 = $('si').value.toLowerCase().trim();
  const list2 = GAMES.filter(g =>
    (activeCat==='Todos'||g.c===activeCat) &&
    (!q2||g.n.toLowerCase().includes(q2)||g.c.toLowerCase().includes(q2))
  );
  const grid2 = $('grid');
  grid2.innerHTML = '';
  $('empty').style.display = list2.length?'none':'block';
  $('cnt').textContent = list2.length;
  list2.forEach((g,i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(i*8,200)+'ms';
    card.innerHTML = `<div class="ct">${g.e}</div><div class="cb2"><div class="cn">${g.n}</div><div class="cc">${g.c}</div></div>`;
    card.onclick = () => openGame2(g);
    grid2.appendChild(card);
  });
}

function openGame2(g) {
  if (currentCleanup) { currentCleanup(); currentCleanup = null; }
  $('gw').innerHTML = '';
  $('otitle').textContent = '▶ ' + g.n.toUpperCase();
  $('ov').classList.add('on');
  document.body.style.overflow = 'hidden';
  $('home').style.overflow = 'hidden';
  const fn = ENGINES[g.fn];
  if (fn) {
    try { currentCleanup = fn($('gw')) || null; }
    catch(e) { $('gw').innerHTML=`<div class="gmsg"><div style="color:#ff3355;font-family:Orbitron,monospace;font-size:.9rem">ERRO AO CARREGAR</div><div style="color:#7a92aa;font-size:.8rem;margin-top:.5rem">${e.message}</div></div>`; }
  } else {
    $('gw').innerHTML = `<div class="gmsg"><div style="color:#ffd700;font-family:Orbitron,monospace;font-size:1rem">EM BREVE</div></div>`;
  }
}

function closeGame() {
  if (currentCleanup) { currentCleanup(); currentCleanup = null; }
  $('ov').classList.remove('on');
  $('gw').innerHTML = '';
  document.body.style.overflow = '';
  $('home').style.overflow = 'auto';
}

function fsGame() {
  const el = $('gw');
  (el.requestFullscreen||el.webkitRequestFullscreen||(()=>{})).call(el);
}

$('si').addEventListener('input', render2);
document.addEventListener('keydown', e => {
  if (e.key==='Escape' && $('ov').classList.contains('on')) closeGame();
});

render2();
