<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Unblocker | Ultra Stealth</title>
    <style>
        /* Estética Dark Tech que você utiliza em seus projetos */
        body {
            background-color: #222; /* Fundo padrão dos seus apps */
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #007bff; /* Azul vibrante ClassHub */
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
            text-align: center;
        }

        h1 {
            color: #007bff;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        input {
            width: 280px;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: #00ff00;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>UNBLOCKER</h1>
        <input type="text" id="urlInput" placeholder="Ex: instagram.com">
        <button onclick="launch()">ABRIR</button>
    </div>

    <script>
        function launch() {
            let url = document.getElementById('urlInput').value;
            if (!url) return alert("Insira um link!");

            // Limpa a URL
            url = url.replace(/^https?:\/\//, '');

            // Abre a aba about:blank imediatamente
            const win = window.open('about:blank', '_blank');
            
            if (!win) return alert("Permita os pop-ups!");

            // Usando um serviço de "CORS Proxy" público para injetar o conteúdo
            // Isso resolve o problema da tela branca do seu print
            const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://" + url);

            const content = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Google Drive</title> <style>
                        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
                        iframe { width: 100%; height: 100%; border: none; }
                    </style>
                </head>
                <body>
                    <iframe src="${proxyUrl}"></iframe>
                </body>
                </html>
            `;

            win.document.open();
            win.document.write(content);
            win.document.close();
        }
    </script>
</body>
</html>
