<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Access v1.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #222;
            color: #00d4ff;
            font-family: 'Consolas', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra de Navegação */
        .navbar {
            background-color: #1a1a1a;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

        input {
            flex-grow: 1;
            padding: 10px 20px;
            background: #333;
            border: 1px solid #00d4ff;
            border-radius: 5px;
            color: #fff;
            outline: none;
        }

        button {
            padding: 10px 25px;
            background: #00d4ff;
            color: #222;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0099bb;
            box-shadow: 0 0 10px #00d4ff;
        }

        /* Área do Conteúdo */
        #proxy-container {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #fff; /* Fundo branco para os sites carregarem corretamente */
        }

        .welcome-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="url-input" placeholder="https://exemplo.com" onkeydown="if(event.key==='Enter') launch()">
        <button onclick="launch()">ACESSAR</button>
    </div>

    <div id="view" style="flex-grow: 1;">
        <div id="msg" class="welcome-msg">
            <h2>AGUARDANDO CONEXÃO...</h2>
            <p style="color: #666; margin-top: 10px;">Digite uma URL e pressione Enter.</p>
        </div>
        <iframe id="proxy-container" style="display: none;"></iframe>
    </div>

    <script>
        function launch() {
            let url = document.getElementById('url-input').value;
            const iframe = document.getElementById('proxy-container');
            const msg = document.getElementById('msg');

            if (!url) return;

            // Adiciona https:// caso o usuário esqueça
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            // Usando o serviço CroxyProxy como motor (mais estável para iframe único)
            const proxyService = "https://www.croxyproxy.com/_proxy/php?url=";
            
            msg.style.display = 'none';
            iframe.style.display = 'block';
            iframe.src = proxyService + encodeURIComponent(url);
        }
    </script>
</body>
</html>
