<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassPlay — Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d12;--card:#15151d;--card2:#1b1b25;
  --a:#00d1ff;--ag:rgba(0,209,255,.18);--ag2:rgba(0,209,255,.07);
  --t:#eef4ff;--t2:#8aa0b8;--t3:#4a6278;
  --border:rgba(0,209,255,.13);--border2:rgba(0,209,255,.32);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:linear-gradient(rgba(0,209,255,.02) 1px,transparent 1px) 0 0/44px 44px,
             linear-gradient(90deg,rgba(0,209,255,.02) 1px,transparent 1px) 0 0/44px 44px;
  pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
header{position:sticky;top:0;z-index:999;background:rgba(13,13,18,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.h-inner{max-width:1560px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:1.2rem;height:62px}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.3rem;color:var(--a);letter-spacing:.05em;cursor:pointer;flex-shrink:0;text-shadow:0 0 20px rgba(0,209,255,.4)}
.logo span{color:#fff}
.search-wrap{flex:1;max-width:480px;position:relative}
#si{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:50px;padding:.5rem 1rem .5rem 2.5rem;color:var(--t);font-family:'Rajdhani',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s}
#si::placeholder{color:var(--t3)}
#si:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag2)}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:1rem;pointer-events:none}
.h-count{font-family:'Orbitron',monospace;font-size:.62rem;color:var(--t3);letter-spacing:.1em;flex-shrink:0}
.h-count b{color:var(--a)}

/* CATBAR */
.catbar{background:rgba(13,13,18,.94);border-bottom:1px solid var(--border);padding:0 1.5rem;overflow-x:auto;scrollbar-width:none;position:sticky;top:62px;z-index:998}
.catbar::-webkit-scrollbar{display:none}
.cat-inner{max-width:1560px;margin:0 auto;display:flex;gap:.25rem;padding:.45rem 0}
.cat-btn{background:none;border:1px solid transparent;border-radius:50px;color:var(--t2);font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;letter-spacing:.07em;padding:.28rem .9rem;cursor:pointer;white-space:nowrap;transition:all .18s;text-transform:uppercase}
.cat-btn:hover{color:var(--a);border-color:var(--border)}
.cat-btn.on{color:var(--a);border-color:var(--a);background:var(--ag2)}

/* MAIN */
main{max-width:1560px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}
.sec-label{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;display:flex;align-items:center;gap:.75rem;margin-bottom:1.2rem}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* GRID */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:1rem}
#empty{display:none;text-align:center;padding:5rem;font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:.15em;color:var(--t3)}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .18s,border-color .2s,box-shadow .2s;position:relative;animation:pop .25s ease both}
.card:hover{transform:translateY(-5px) scale(1.03);border-color:var(--border2);box-shadow:0 12px 36px rgba(0,0,0,.5),0 0 22px var(--ag)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-thumb{width:100%;aspect-ratio:4/3;background:var(--card2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card-thumb .em{font-size:3.2rem;filter:drop-shadow(0 0 10px rgba(0,209,255,.35))}
.card-play{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.58);opacity:0;transition:opacity .2s}
.card:hover .card-play{opacity:1}
.card-play span{background:var(--a);color:#000;font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;letter-spacing:.1em;padding:.45rem 1.1rem;border-radius:50px;text-transform:uppercase}
.card-body{padding:.65rem .8rem .8rem}
.card-name{font-size:.82rem;font-weight:700;letter-spacing:.04em;color:var(--t);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-cat{font-size:.62rem;color:var(--a);letter-spacing:.1em;opacity:.7;text-transform:uppercase;margin-top:2px}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:2000;background:#000;flex-direction:column}
#overlay.on{display:flex}
.ov-bar{display:flex;align-items:center;gap:.8rem;padding:.6rem 1.2rem;background:#0d0d16;border-bottom:1px solid var(--border);flex-shrink:0}
.ov-title{font-family:'Orbitron',monospace;font-size:.78rem;letter-spacing:.1em;color:var(--a);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--t2);font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.08em;padding:.32rem .8rem;cursor:pointer;transition:all .18s;text-transform:uppercase}
.ov-btn:hover{color:var(--a);border-color:var(--a)}
.ov-btn.close:hover{color:#ff4466;border-color:#ff4466}
#game-frame{flex:1;width:100%;border:none;background:#000}

/* ERR */
#err-box{display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;padding:2rem;text-align:center}
#err-box.on{display:flex}
#err-box h2{font-family:'Orbitron',monospace;color:#ff4466;font-size:1rem;letter-spacing:.1em}
#err-box p{color:var(--t2);font-size:.92rem;max-width:380px;line-height:1.7}
#err-box button{background:var(--a);color:#000;border:none;border-radius:50px;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:.1em;padding:.6rem 1.6rem;cursor:pointer}

@media(max-width:600px){
  #grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem}
  .h-count{display:none}
}
</style>
</head>
<body>

<header>
  <div class="h-inner">
    <div class="logo" onclick="closeGame()">Class<span>Play</span></div>
    <div class="search-wrap">
      <span class="s-icon">⌕</span>
      <input id="si" type="text" placeholder="Buscar jogo..." autocomplete="off">
    </div>
    <div class="h-count">JOGOS: <b id="cnt">0</b></div>
  </div>
</header>

<div class="catbar">
  <div class="cat-inner" id="cats"></div>
</div>

<main>
  <div class="sec-label">Catálogo</div>
  <div id="grid"></div>
  <div id="empty">// Nenhum jogo encontrado //</div>
</main>

<div id="overlay">
  <div class="ov-bar">
    <span class="ov-title" id="ov-title">JOGANDO...</span>
    <button class="ov-btn" onclick="tryFullscreen()">⛶ Fullscreen</button>
    <button class="ov-btn" onclick="openNewTab()">↗ Nova aba</button>
    <button class="ov-btn close" onclick="closeGame()">✕ Fechar</button>
  </div>
  <iframe id="game-frame" allow="fullscreen; autoplay; gamepad" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-top-navigation"></iframe>
  <div id="err-box">
    <h2>⚠ Este jogo bloqueou o embed</h2>
    <p>O servidor desse jogo não permite abrir dentro de outro site. Abra em nova aba para jogar normalmente.</p>
    <button onclick="openNewTab()">↗ Abrir em nova aba</button>
  </div>
</div>

<script>

  {n:"Bob The Robber 4",  e:"🕵️",c:"Ação",     img:"https://webglmath.github.io/bob-the-robber-4/logo.png",              url:"https://webglmath.github.io/bob-the-robber-4/"},

  {n:"Getaway Shootout",  e:"🏃",c:"Ação",     img:"https://webglmath.github.io/getaway-shootout/logo.png",              url:"https://webglmath.github.io/getaway-shootout/"},

  {n:"Football Legends",  e:"⚽",c:"Esportes", img:"https://webglmath.github.io/football-legends/logo.png",              url:"https://webglmath.github.io/football-legends/"},
  {n:"Penalty Kick",      e:"🥅",c:"Esportes", img:"https://webglmath.github.io/penalty-kick-online/logo.png",           url:"https://webglmath.github.io/penalty-kick-online/"},
  {n:"Smash Karts",       e:"🏎️",c:"Esportes", img:"https://webglmath.github.io/smash-karts/logo.png",                   url:"https://webglmath.github.io/smash-karts/"},
  {n:"Rocket Soccer",     e:"⚽",c:"Esportes", img:"https://ubg77.github.io/edit/rocket-soccer-derby/logo.png",          url:"https://ubg77.github.io/edit/rocket-soccer-derby/"},

  // 2 JOGADORES
  {n:"1v1.LOL",           e:"🎮",c:"2P",       img:"https://webglmath.github.io/1v1-lol/logo.png",                       url:"https://webglmath.github.io/1v1-lol/"},
  {n:"Rooftop Snipers",   e:"🏙️",c:"2P",       img:"https://webglmath.github.io/rooftop-snipers/logo.png",               url:"https://webglmath.github.io/rooftop-snipers/"},
  {n:"Getaway Shootout",  e:"🔫",c:"2P",       img:"https://webglmath.github.io/getaway-shootout/logo.png",              url:"https://webglmath.github.io/getaway-shootout/"},
  {n:"Wrassling",         e:"🤼",c:"2P",       img:"https://slope-game.github.io/img/wrassling.png",                     url:"https://slope-game.github.io/newgame/wrassling/"},
  {n:"Thumb Fighter",     e:"👍",c:"2P",       img:"https://slope-game.github.io/img/thumb-fighter.png",                 url:"https://slope-game.github.io/newgame/thumb-fighter/"},

  // PUZZLE / IDLE

  {n:"Golfinity",         e:"⛳",c:"Puzzle",   img:"https://slope-game.github.io/img/golfinity.png",                     url:"https://slope-game.github.io/newgame/golfinity/"},

  // AVENTURA

  {n:"Parkour Race",      e:"🏃",c:"Aventura", img:"https://ubg77.github.io/fix/parkour-race/logo.png",                  url:"https://ubg77.github.io/fix/parkour-race/"},
  {n:"Elasticman",        e:"🫠",c:"Aventura", img:"https://ubg77.github.io/updatefaqs/elasticman/logo.png",             url:"https://ubg77.github.io/updatefaqs/elasticman/"},
  {n:"Bob The Robber 4",  e:"🕵️",c:"Aventura", img:"https://webglmath.github.io/bob-the-robber-4/logo.png",              url:"https://webglmath.github.io/bob-the-robber-4/"},

  // TERROR
  {n:"FNAF 1",            e:"🐻",c:"Terror",   img:"https://slope-game.github.io/img/fnaf1.png",                         url:"https://slope-game.github.io/newgame/fnaf1/"},
  {n:"Among Us",          e:"🔴",c:"Terror",   img:"https://webglmath.github.io/among-us/logo.png",                      url:"https://webglmath.github.io/among-us/"},
];

let currentCat = "Todos", currentUrl = "";

// build category buttons
const cats = ["Todos", ...new Set(GAMES.map(g => g.c))];
const catsEl = document.getElementById("cats");
cats.forEach(c => {
  const b = document.createElement("button");
  b.className = "cat-btn" + (c === "Todos" ? " on" : "");
  b.textContent = c;
  b.onclick = () => {
    document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    currentCat = c;
    render();
  };
  catsEl.appendChild(b);
});

function render() {
  const q = document.getElementById("si").value.toLowerCase().trim();
  const list = GAMES.filter(g =>
    (currentCat === "Todos" || g.c === currentCat) &&
    (!q || g.n.toLowerCase().includes(q) || g.c.toLowerCase().includes(q))
  );
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("empty").style.display = list.length ? "none" : "block";
  document.getElementById("cnt").textContent = list.length;

  list.forEach((g, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = Math.min(i * 10, 200) + "ms";
    card.innerHTML = `
      <div class="card-thumb">
        <img src="${g.img}" alt="${g.n}" onerror="this.remove()">
        <div class="em">${g.e}</div>
        <div class="card-play"><span>▶ JOGAR</span></div>
      </div>
      <div class="card-body">
        <div class="card-name">${g.n}</div>
        <div class="card-cat">${g.c}</div>
      </div>`;
    card.onclick = () => openGame(g);
    grid.appendChild(card);
  });
}

function openGame(g) {
  currentUrl = g.url;
  document.getElementById("ov-title").textContent = "▶ " + g.n.toUpperCase();
  const frame = document.getElementById("game-frame");
  const err = document.getElementById("err-box");
  frame.style.flex = "1";
  err.classList.remove("on");
  frame.src = g.url;
  document.getElementById("overlay").classList.add("on");
  document.body.style.overflow = "hidden";
}

function closeGame() {
  document.getElementById("overlay").classList.remove("on");
  document.getElementById("game-frame").src = "about:blank";
  document.getElementById("err-box").classList.remove("on");
  document.body.style.overflow = "";
}

function openNewTab() { if (currentUrl) window.open(currentUrl, "_blank"); }

function tryFullscreen() {
  const el = document.getElementById("game-frame");
  (el.requestFullscreen || el.webkitRequestFullscreen || (()=>{})).call(el);
}

document.getElementById("si").addEventListener("input", render);
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.getElementById("overlay").classList.contains("on")) closeGame();
});

render();
</script>
</body>
</html>
