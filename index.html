<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Unblocker | Stealth</title>
    <style>
        body { background-color: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
        h1 { color: #007bff; text-transform: uppercase; }
        input { padding: 15px; width: 300px; background: #333; border: 2px solid #007bff; color: white; border-radius: 5px; outline: none; }
        button { padding: 15px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Class Unblocker</h1>
        <input type="text" id="urlInput" placeholder="Ex: google.com">
        <button onclick="launch()">Abrir</button>
    </div>

    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <script>
        async function launch() {
            const url = document.getElementById('urlInput').value;
            if (!url) return;

            // 1. Abre a aba em branco primeiro
            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert("Ative os pop-ups para funcionar!");
                return;
            }

            // 2. Codifica a URL para o formato do Ultraviolet
            // Isso evita o erro de "Tela Branca" (CORS)
            const proxiedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);

            // 3. Escreve o conteúdo diretamente no about:blank
            // Usamos um script de carregamento para garantir que o CSS e JS do site funcionem
            win.document.write(`
                <title>Google Drive</title>
                <style>body { margin: 0; padding: 0; overflow: hidden; background: #000; }</style>
                <script>
                    window.location.href = "${window.location.origin}${proxiedUrl}";
                <\/script>
            `);
        }
    </script>
</body>
</html>
