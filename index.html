<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Estudos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #222; /* Seu padrão Dark Tech */
            color: #00d4ff; /* Azul vibrante ClassHub */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #00d4ff;
            z-index: 100;
        }

        .search-area {
            flex-grow: 1;
            display: flex;
            gap: 8px;
        }

        input {
            flex-grow: 1;
            padding: 8px 15px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            outline: none;
        }

        button {
            padding: 8px 18px;
            background: #00d4ff;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        #viewport {
            flex-grow: 1;
            width: 100%;
            background: #222;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #fff;
        }

        .welcome {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold;">WEB<span>CORE</span></div>
        <div class="search-area">
            <input type="text" id="url-input" placeholder="URL completa (ex: https://poki.com)" autocomplete="off">
            <button onclick="access()">ACESSAR</button>
        </div>
    </div>

    <div id="viewport">
        <div id="msg" class="welcome">
            <h2>SISTEMA ATIVO</h2>
            <p style="color: #666; margin-top: 5px;">Digite a URL com https:// para evitar erros.</p>
        </div>
        <iframe id="main-frame"></iframe>
    </div>

    <script>
        function access() {
            const input = document.getElementById('url-input').value.trim();
            const frame = document.getElementById('main-frame');
            const msg = document.getElementById('msg');

            if (!input) return;

            // Formata a URL corretamente
            let targetUrl = input.startsWith('http') ? input : 'https://' + input;

            msg.style.display = 'none';
            frame.style.display = 'block';

            // Usando um motor alternativo de espelhamento que funciona melhor em iframes
            // Este link abaixo é um "Web Mirror" que costuma ignorar bloqueios de iframe
            frame.src = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);
            
            // OBS: O AllOrigins apenas busca o conteúdo. 
            // Para navegar de verdade em sites como Poki ou YouTube, 
            // o motor oficial recomendado para Vercel é o Ultraviolet (que você já conhece).
            
            // Como você quer arquivo único, tentaremos o proxy dinâmico:
            frame.src = "https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=3600&url=" + encodeURIComponent(targetUrl);
        }
    </script>
</body>
</html>
