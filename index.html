<title>ClassPlay — Portal de Jogos</title>

<style>
  :root{--bg:#0a0a0a;--s:#111116;--s2:#16161e;--a:#00d1ff;--g:rgba(0,209,255,.25);--g2:rgba(0,209,255,.08);--t:#e8f4ff;--d:#7a8fa8;--b:rgba(0,209,255,.15);--bh:rgba(0,209,255,.6)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--t);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,209,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,209,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse,rgba(0,209,255,.07) 0%,transparent 70%);pointer-events:none;z-index:0}

  header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);padding:0 1.5rem}
  .hi{max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;height:68px}
  .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.35rem;letter-spacing:.05em;color:var(--a);text-shadow:0 0 20px var(--g);white-space:nowrap;flex-shrink:0;text-decoration:none}
  .logo span{color:#fff}
  .sw{flex:1;position:relative;max-width:680px}
  .sicon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--a);font-size:1.1rem;pointer-events:none}
  #si{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:.65rem 1rem .65rem 2.8rem;color:var(--t);font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:.03em;outline:none;transition:border-color .2s,box-shadow .2s}
  #si::placeholder{color:var(--d)}
  #si:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--g2)}
  .stats{font-family:'Orbitron',monospace;font-size:.68rem;color:var(--d);white-space:nowrap;flex-shrink:0;letter-spacing:.08em}
  .stats b{color:var(--a)}

  .tb{position:sticky;top:68px;z-index:99;background:rgba(10,10,10,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);padding:0 1.5rem;overflow-x:auto;scrollbar-width:none}
  .tb::-webkit-scrollbar{display:none}
  .ti{max-width:1600px;margin:0 auto;display:flex;gap:.2rem;padding:.45rem 0}
  .tab{background:none;border:1px solid transparent;border-radius:6px;color:var(--d);font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.06em;padding:.3rem .85rem;cursor:pointer;white-space:nowrap;transition:all .18s;text-transform:uppercase}
  .tab:hover{color:var(--a);border-color:var(--b)}
  .tab.on{color:var(--a);border-color:var(--a);background:var(--g2)}

  main{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:1.5rem}
  .sh{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
  .st{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.15em;color:var(--d);text-transform:uppercase}
  .sl{flex:1;height:1px;background:linear-gradient(90deg,var(--b),transparent)}

  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.9rem}

  .card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:1.1rem .9rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.6rem;text-align:center;transition:transform .18s,border-color .18s,box-shadow .18s,background .18s;position:relative;overflow:hidden;animation:fi .3s ease both}
  .card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,209,255,.07),transparent 70%);opacity:0;transition:opacity .25s}
  .card:hover{transform:translateY(-4px) scale(1.025);border-color:var(--bh);box-shadow:0 0 22px var(--g),0 8px 28px rgba(0,0,0,.45);background:var(--s2)}
  .card:hover::before{opacity:1}
  .em{font-size:2.2rem;line-height:1;filter:drop-shadow(0 0 6px rgba(0,209,255,.25));transition:transform .2s,filter .2s}
  .card:hover .em{transform:scale(1.18);filter:drop-shadow(0 0 14px rgba(0,209,255,.55))}
  .cn{font-size:.8rem;font-weight:600;letter-spacing:.04em;color:var(--t);line-height:1.3;text-transform:uppercase}
  .cc{font-size:.62rem;color:var(--a);letter-spacing:.1em;opacity:.7;text-transform:uppercase}
  /* badge for new-tab games */
  .ntbadge{position:absolute;top:7px;right:8px;font-size:.52rem;background:rgba(0,209,255,.15);color:var(--a);border:1px solid var(--b);border-radius:4px;padding:1px 5px;letter-spacing:.06em;text-transform:uppercase}
  @keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  #nr{display:none;text-align:center;padding:5rem 2rem;color:var(--d);font-family:'Orbitron',monospace;font-size:.85rem;letter-spacing:.12em}

  /* OVERLAY */
  #ov{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.97);backdrop-filter:blur(8px);flex-direction:column}
  #ov.on{display:flex}
  .ob{display:flex;align-items:center;gap:.8rem;padding:.65rem 1.5rem;background:rgba(17,17,22,.99);border-bottom:1px solid var(--b);flex-shrink:0;flex-wrap:wrap}
  #ot{font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:.1em;color:var(--a);flex:1;text-shadow:0 0 10px var(--g);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .obtn{background:none;border:1px solid var(--b);border-radius:6px;color:var(--d);font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.08em;padding:.35rem .85rem;cursor:pointer;transition:all .18s;text-transform:uppercase}
  .obtn.cl:hover{color:#ff4466;border-color:#ff4466;background:rgba(255,68,102,.08)}
  .obtn.fs:hover{color:var(--a);border-color:var(--a);background:var(--g2)}
  #gf{flex:1;width:100%;border:none;background:#000}

  footer{position:relative;z-index:1;text-align:center;padding:1.5rem;color:var(--d);font-size:.76rem;letter-spacing:.08em;border-top:1px solid var(--b);margin-top:3rem}
  footer span{color:var(--a)}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--bh);border-radius:3px}
  @media(max-width:600px){.stats{display:none}main{padding:1rem}#grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.7rem}}
</style>
</head>

<header>
  <div class="hi">
    <a class="logo" href="#">Class<span>Play</span></a>
    <div class="sw">
      <span class="sicon">⌕</span>
      <input type="text" id="si" placeholder="Buscar jogo..." autocomplete="off" spellcheck="false">
    </div>
    <div class="stats">JOGOS: <b id="cnt">0</b></div>
  </div>
</header>

<div class="tb"><div class="ti" id="ti"></div></div>

<main>
  <div class="sh"><span class="st">Catálogo</span><div class="sl"></div></div>
  <div id="grid"></div>
  <div id="nr">// NENHUM JOGO ENCONTRADO //</div>
</main>

<footer><span>ClassPlay</span> — Links diretos verificados · HTML5 · Chromebook Ready</footer>

<div id="ov">
  <div class="ob">
    <span id="ot">CARREGANDO...</span>
    <button class="obtn fs" onclick="fsGame()">⛶ Fullscreen</button>
    <button class="obtn cl" onclick="closeOv()">✕ Fechar</button>

  b.className="tab"+(c==="Todos"?" on":"");
  b.textContent=c;
  b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));b.classList.add("on");cat=c;render();};
  ti.appendChild(b);
});

const grid=document.getElementById("grid"),nr=document.getElementById("nr"),cnt=document.getElementById("cnt");
cnt.textContent=GAMES.length;

function render(){
  const f=GAMES.filter(g=>(cat==="Todos"||g.cat===cat)&&(!q||g.name.toLowerCase().includes(q)||g.cat.toLowerCase().includes(q)));
  grid.innerHTML="";nr.style.display=f.length?"none":"block";cnt.textContent=f.length;
  f.forEach((g,i)=>{
    const d=document.createElement("div");d.className="card";d.style.animationDelay=Math.min(i*12,250)+"ms";
    d.innerHTML=`${g.newTab?'<span class="ntbadge">↗ nova aba</span>':''}<div class="em">${g.emoji}</div><div class="cn">${g.name}</div><div class="cc">${g.cat}</div>`;
    d.onclick=()=>openGame(g);grid.appendChild(d);
  });
}

document.getElementById("si").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});

const ov=document.getElementById("ov"),gf=document.getElementById("gf"),ot=document.getElementById("ot");

function openGame(g){
  if(g.newTab){window.open(g.url,"_blank");return;}
  ot.textContent="▶ "+g.name.toUpperCase();
  gf.src=g.url;
  ov.classList.add("on");
  document.body.style.overflow="hidden";
}
function closeOv(){ov.classList.remove("on");gf.src="";document.body.style.overflow="";}
function fsGame(){
  if(!document.fullscreenElement)(gf.requestFullscreen||gf.webkitRequestFullscreen||function(){}).call(gf);
  else(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeOv();});

render();
</script>
</body>
</html>
