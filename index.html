<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCore v2 - Pesquisa Acadêmica</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #222;
            color: #00d4ff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Estilizado - Estilo Dark Tech */
        .header {
            background-color: #1a1a1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .logo {
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #00d4ff;
        }

        .logo span { color: #fff; }

        .search-bar {
            flex-grow: 1;
            display: flex;
            background: #333;
            border-radius: 5px;
            border: 1px solid #444;
            overflow: hidden;
            transition: 0.3s;
        }

        .search-bar:focus-within {
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        input {
            flex-grow: 1;
            padding: 10px 15px;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 0 20px;
            background: #00d4ff;
            color: #1a1a1a;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover { background: #00b8dd; }

        /* Área do Navegador */
        #browser-container {
            flex-grow: 1;
            width: 100%;
            background: #222;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff; /* Fundo branco para os sites carregarem certo */
            display: none;
        }

        /* Tela Inicial */
        .hero {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .hero h1 { font-size: 2rem; margin-bottom: 10px; }
        .hero p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">WEB<span>CORE</span></div>
        <div class="search-bar">
            <input type="text" id="url-input" placeholder="URL ou Pesquisa Google..." autocomplete="off">
            <button onclick="access()">Acessar</button>
        </div>
    </div>

    <div id="browser-container">
        <div id="setup-screen" class="hero">
            <h1>SISTEMA ONLINE</h1>
            <p>Insira um link acima para iniciar a sessão segura.</p>
        </div>
        <iframe id="content-frame"></iframe>
    </div>

    <script>
        const input = document.getElementById('url-input');
        const frame = document.getElementById('content-frame');
        const setup = document.getElementById('setup-screen');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') access();
        });

        function access() {
            let val = input.value.trim();
            if (!val) return;

            let targetUrl;
            
            // Lógica de Detecção: URL vs Pesquisa
            if (!val.includes('.') || val.includes(' ')) {
                targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(val);
            } else {
                targetUrl = val.startsWith('http') ? val : 'https://' + val;
            }

            // Usando o endpoint de processamento do Croxy mais estável
            // Esta forma de envio via formulário ou URL direta ajuda a evitar o erro 404/Wrong
            const proxyService = "https://www.croxyproxy.com/_proxy/php?url=";
            
            setup.style.display = 'none';
            frame.style.display = 'block';
            frame.src = proxyService + encodeURIComponent(targetUrl);
        }
    </script>
</body>
</html>
