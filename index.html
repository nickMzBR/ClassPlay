<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassPlay — Portal de Jogos</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111116;
    --surface2: #16161e;
    --accent: #00d1ff;
    --accent2: #0094ff;
    --accent-glow: rgba(0,209,255,0.25);
    --accent-glow2: rgba(0,209,255,0.08);
    --text: #e8f4ff;
    --text-dim: #7a8fa8;
    --border: rgba(0,209,255,0.15);
    --border-hover: rgba(0,209,255,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,209,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,209,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow top center */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(0,209,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 70px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(0,209,255,0.15);
    white-space: nowrap;
    flex-shrink: 0;
    text-decoration: none;
  }

  .logo span { color: #fff; }

  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 700px;
  }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 1rem;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 1rem 0.65rem 2.8rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput::placeholder { color: var(--text-dim); }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow2), 0 0 20px var(--accent-glow2);
  }

  .stats {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.08em;
  }

  .stats b { color: var(--accent); }

  /* ===== CATEGORY TABS ===== */
  .tabs-bar {
    position: sticky;
    top: 70px;
    z-index: 99;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .tabs-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    gap: 0.25rem;
    padding: 0.5rem 0;
  }

  .tab-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    text-transform: uppercase;
  }

  .tab-btn:hover { color: var(--accent); border-color: var(--border); }
  .tab-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-glow2);
    text-shadow: 0 0 10px var(--accent-glow);
  }

  /* ===== MAIN ===== */
  main {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 2rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ===== GAME GRID ===== */
  #gameGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 1rem;
  }

  /* ===== GAME CARD ===== */
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    text-align: center;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.3s ease both;
  }

  .game-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,209,255,0.07), transparent 70%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .game-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--border-hover);
    box-shadow: 0 0 20px var(--accent-glow), 0 8px 30px rgba(0,0,0,0.4);
    background: var(--surface2);
  }

  .game-card:hover::before { opacity: 1; }

  .card-emoji {
    font-size: 2.4rem;
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(0,209,255,0.3));
    transition: transform 0.2s, filter 0.2s;
  }

  .game-card:hover .card-emoji {
    transform: scale(1.15);
    filter: drop-shadow(0 0 14px rgba(0,209,255,0.5));
  }

  .card-name {
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.3;
    text-transform: uppercase;
  }

  .card-cat {
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    opacity: 0.7;
    text-transform: uppercase;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== NO RESULTS ===== */
  #noResults {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-dim);
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
  }

  /* ===== OVERLAY / IFRAME PLAYER ===== */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.96);
    backdrop-filter: blur(8px);
    flex-direction: column;
  }

  #overlay.active { display: flex; }

  .overlay-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1.5rem;
    background: rgba(17,17,22,0.98);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #overlayTitle {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    flex: 1;
    text-shadow: 0 0 10px var(--accent-glow);
  }

  .overlay-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .overlay-btn:hover {
    color: #ff4466;
    border-color: #ff4466;
    background: rgba(255,68,102,0.08);
  }

  .overlay-btn.fs-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-glow2);
  }

  #gameFrame {
    flex: 1;
    width: 100%;
    border: none;
    background: #000;
  }

  /* ===== FOOTER ===== */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }

  footer span { color: var(--accent); }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

  @media (max-width: 600px) {
    .header-inner { gap: 1rem; }
    .stats { display: none; }
    main { padding: 1rem; }
    #gameGrid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }
  }
</style>
</head>

<!-- HEADER -->
<header>

    </div>
    <div class="stats">JOGOS: <b id="countDisplay">300</b></div>
  </div>
</header>

<!-- CATEGORY TABS -->
<div class="tabs-bar">

</div>

<!-- MAIN -->
<main>

  </div>
  <div id="gameGrid"></div>
  <div id="noResults">// NENHUM JOGO ENCONTRADO //</div>
</main>

<!-- FOOTER -->
<footer>
  <span>ClassPlay</span> — 300 jogos HTML5 &amp; WebAssembly · Otimizado para Chromebook
</footer>

<!-- GAME OVERLAY -->
<div id="overlay">

// ── CATEGORIES ──
const ALL_CATS = ["Todos", ...new Set(GAMES.map(g => g.cat))];

let currentCat = "Todos";
let searchQuery = "";

// ── BUILD TABS ──
const tabsInner = document.getElementById("tabsInner");
ALL_CATS.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (cat === "Todos" ? " active" : "");
  btn.textContent = cat;
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCat = cat;
    renderGames();
  });
  tabsInner.appendChild(btn);
});

// ── BUILD GRID ──
const grid = document.getElementById("gameGrid");
const noResults = document.getElementById("noResults");
const countDisplay = document.getElementById("countDisplay");

function renderGames() {
  const q = searchQuery.toLowerCase().trim();
  const filtered = GAMES.filter(g => {
    const catMatch = currentCat === "Todos" || g.cat === currentCat;
    const qMatch = !q || g.name.toLowerCase().includes(q) || g.cat.toLowerCase().includes(q);
    return catMatch && qMatch;
  });

  grid.innerHTML = "";

  if (filtered.length === 0) {
    noResults.style.display = "block";
    countDisplay.textContent = "0";
    return;
  }

  noResults.style.display = "none";
  countDisplay.textContent = filtered.length;

  filtered.forEach((game, i) => {
    const card = document.createElement("div");
    card.className = "game-card";
    card.style.animationDelay = Math.min(i * 15, 300) + "ms";
    card.innerHTML = `
      <div class="card-emoji">${game.emoji}</div>
      <div class="card-name">${game.name}</div>
      <div class="card-cat">${game.cat}</div>
    `;
    card.addEventListener("click", () => openGame(game));
    grid.appendChild(card);
  });
}

// ── SEARCH ──
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGames();
});

// ── GAME OVERLAY ──
const overlay = document.getElementById("overlay");
const gameFrame = document.getElementById("gameFrame");
const overlayTitle = document.getElementById("overlayTitle");

function openGame(game) {
  overlayTitle.textContent = `▶ ${game.name.toUpperCase()}`;
  gameFrame.src = game.url;
  overlay.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeOverlay() {
  overlay.classList.remove("active");
  gameFrame.src = "";
  document.body.style.overflow = "";
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    gameFrame.requestFullscreen?.() || gameFrame.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

// Close on ESC
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeOverlay();
});

// ── INIT ──
renderGames();
</script>
