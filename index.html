<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassPlay — 100 Jogos</title>

<style>
:root{--bg:#09090f;--card:#13131c;--card2:#1a1a26;--a:#00d4ff;--ag:rgba(0,212,255,.2);--ag2:rgba(0,212,255,.07);--green:#00ff88;--red:#ff3355;--yellow:#ffd700;--t:#eef4ff;--t2:#7a92aa;--t3:#3a5268;--border:rgba(0,212,255,.13);--border2:rgba(0,212,255,.35);}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px) 0 0/40px 40px,linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px) 0 0/40px 40px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
#hdr{flex-shrink:0;background:rgba(9,9,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100}
.hi{max-width:1600px;margin:0 auto;padding:0 1.2rem;display:flex;align-items:center;gap:1rem;height:58px}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.25rem;color:var(--a);letter-spacing:.05em;flex-shrink:0;text-shadow:0 0 18px rgba(0,212,255,.45);cursor:pointer}
.logo b{color:#fff}
.sw{flex:1;max-width:440px;position:relative}
#si{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:50px;padding:.45rem 1rem .45rem 2.4rem;color:var(--t);font-family:'Rajdhani',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s,box-shadow .2s}
#si::placeholder{color:var(--t3)}
#si:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag2)}
.si-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:.95rem}
#gcnt{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--t3);letter-spacing:.1em;flex-shrink:0}
#gcnt b{color:var(--a)}

/* CATBAR */
#catbar{flex-shrink:0;background:rgba(9,9,15,.95);border-bottom:1px solid var(--border);padding:0 1.2rem;overflow-x:auto;scrollbar-width:none;z-index:99}
#catbar::-webkit-scrollbar{display:none}
.ci{max-width:1600px;margin:0 auto;display:flex;gap:.2rem;padding:.4rem 0}
.cb{background:none;border:1px solid transparent;border-radius:50px;color:var(--t2);font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.07em;padding:.25rem .8rem;cursor:pointer;white-space:nowrap;transition:all .15s;text-transform:uppercase}
.cb:hover{color:var(--a);border-color:var(--border)}
.cb.on{color:var(--a);border-color:var(--a);background:var(--ag2)}

/* HOME */
#home{flex:1;overflow-y:auto;position:relative;z-index:1}
.hi2{max-width:1600px;margin:0 auto;padding:1.2rem}
.sl{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.sl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* GRID */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.85rem}
#empty{display:none;text-align:center;padding:4rem;font-family:'Orbitron',monospace;font-size:.75rem;color:var(--t3);letter-spacing:.15em}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .16s,border-color .18s,box-shadow .18s;position:relative;animation:popin .22s ease both}
.card:hover{transform:translateY(-4px) scale(1.025);border-color:var(--border2);box-shadow:0 10px 32px rgba(0,0,0,.55),0 0 18px var(--ag)}
@keyframes popin{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.ct{width:100%;aspect-ratio:4/3;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:2.8rem;position:relative;overflow:hidden}
.ct::after{content:'▶ JOGAR';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);color:var(--a);font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;letter-spacing:.12em;opacity:0;transition:opacity .18s}
.card:hover .ct::after{opacity:1}
.cb2{padding:.55rem .7rem .65rem}
.cn{font-size:.75rem;font-weight:700;letter-spacing:.04em;color:var(--t);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc{font-size:.58rem;color:var(--a);letter-spacing:.1em;opacity:.65;text-transform:uppercase;margin-top:1px}

/* OVERLAY */
#ov{display:none;position:fixed;inset:0;z-index:1000;background:#000;flex-direction:column}
#ov.on{display:flex}
.ob{display:flex;align-items:center;gap:.7rem;padding:.5rem 1rem;background:#0a0a12;border-bottom:1px solid var(--border);flex-shrink:0}
#otitle{font-family:'Orbitron',monospace;font-size:.72rem;letter-spacing:.1em;color:var(--a);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--t2);font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.07em;padding:.28rem .7rem;cursor:pointer;transition:all .16s;text-transform:uppercase}

#gw canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);image-rendering:pixelated}
#gw .gmsg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;font-family:'Orbitron',monospace;text-align:center;padding:2rem}

}
</style>

function makeCanvas(w, h, bg='#050508') {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.style.background = bg;
  return c;
}

function gameOver(ctx, w, h, score, restartFn) {
  ctx.fillStyle = 'rgba(0,0,0,.72)';
  ctx.fillRect(0,0,w,h);
  ctx.fillStyle = '#ff3355';
  ctx.font = `bold ${Math.floor(w/14)}px Orbitron,monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', w/2, h/2 - w/14);
  ctx.fillStyle = '#00d4ff';
  ctx.font = `${Math.floor(w/22)}px Orbitron,monospace`;
  ctx.fillText('Score: ' + score, w/2, h/2 + 10);
  ctx.fillStyle = '#7a92aa';
  ctx.font = `${Math.floor(w/30)}px Rajdhani,sans-serif`;
  ctx.fillText('ESPAÇO / CLIQUE para reiniciar', w/2, h/2 + w/14 + 15);
}

function startMsg(ctx, w, h, title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(0,0,w,h);
  ctx.fillStyle = '#00d4ff';
  ctx.font = `bold ${Math.floor(w/12)}px Orbitron,monospace`;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 18;
  ctx.fillText(title, w/2, h/2 - 20);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#eef4ff';
  ctx.font = `${Math.floor(w/28)}px Rajdhani,sans-serif`;
  ctx.fillText(sub, w/2, h/2 + 20);
}

function hud(ctx, score, lives, w, extra='') {
  ctx.fillStyle = '#00d4ff';
  ctx.font = `bold ${Math.floor(w/30)}px Orbitron,monospace`;
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 12, Math.floor(w/30) + 8);
  if (lives !== null) {
    ctx.textAlign = 'right';
    ctx.fillText('❤'.repeat(Math.max(0,lives)), w - 12, Math.floor(w/30) + 8);
  }
  if (extra) {
    ctx.textAlign = 'center';
    ctx.fillText(extra, w/2, Math.floor(w/30) + 8);
  }
}

//  ENGINES DOS JOGOS
// ═══════════════════════════════════════════════════════════
const ENGINES = {};

// helper: physics bike engine (reusado por todos os jogos de moto)
function bikePhysicsEngine(container, opts) {
  const W=800, H=500;
  const c = makeCanvas(W, H, '#0a0510');
  container.appendChild(c);
  const ctx = c.getContext('2d');
  c.style.cssText = 'width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';

  const { theme = {sky:'#0a0510',ground:'#1a2a1a',groundLine:'#00ff88',accent:'#00d4ff'}, levelFn } = opts;

  let level = 0, lives = 3, score = 0, state = 'start';
  let bike, wheels, segments, stars, coins, obstacles, camX, raf;

  function mkBike() {
    return {
      x: 150, y: 200, vx: 0, vy: 0,
      angle: 0, angVel: 0,
      onGround: false, dead: false, won: false,
      throttle: false, brake: false, leanL: false, leanR: false
    };
  }

  function getY(segs, x) {
    for (let i = 0; i < segs.length - 1; i++) {
      if (x >= segs[i].x && x <= segs[i+1].x) {
        const t = (x - segs[i].x) / (segs[i+1].x - segs[i].x);
        return segs[i].y + t * (segs[i+1].y - segs[i].y);
      }
    }
    return segs[segs.length-1]?.y || 300;
  }

  function genLevel(lvl) {
    const segs = [{x:0,y:300}];
    let x = 0, y = 300;
    const count = 60 + lvl * 10;
    for (let i = 0; i < count; i++) {
      x += 80 + Math.random()*80;
      y += (Math.random()-0.48) * (40 + lvl*6);
      y = Math.max(150, Math.min(420, y));
      segs.push({x, y});
    }
    // add ramps from levelFn if provided
    const extra = levelFn ? levelFn(lvl, segs) : [];
    return { segs, end: x - 80, obstacles: extra };
  }

  function reset() {
    const gen = genLevel(level);
    segments = gen.segs;
    obstacles = gen.obstacles || [];
    coins = [];
    for (let s of segments) {
      if (Math.random() < 0.15) coins.push({x: s.x + 20, y: s.y - 50, r: 10, got: false});
    }
    stars = Array.from({length:120}, () => ({x:Math.random()*segments[segments.length-1].x, y:Math.random()*150+20}));
    bike = mkBike();
    const sy = getY(segments, 150);
    bike.y = sy - 28;
    camX = 0;
    state = 'play';
  }

  function drawGround(ox) {
    ctx.beginPath();
    ctx.moveTo(segments[0].x - ox, segments[0].y);
    for (let s of segments) ctx.lineTo(s.x - ox, s.y);
    ctx.lineTo(segments[segments.length-1].x - ox, H+50);
    ctx.lineTo(0, H+50);
    ctx.fillStyle = theme.ground;
    ctx.fill();
    ctx.strokeStyle = theme.groundLine;
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function drawBike(bx, by, angle, dead) {
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(angle);
    // body
    ctx.fillStyle = dead ? '#ff3355' : accent(theme.accent);
    ctx.beginPath();
    ctx.roundRect(-22,-12,44,18,4);
    ctx.fill();
    // rider
    ctx.fillStyle = dead ? '#882200' : '#fff';
    ctx.beginPath();
    ctx.ellipse(0,-22,10,13,0,0,Math.PI*2);
    ctx.fill();
    // wheels
    ctx.strokeStyle = dead ? '#882200' : theme.accent;
    ctx.lineWidth = 4;
    [-16,16].forEach(wx => {
      ctx.beginPath();
      ctx.arc(wx, 8, 11, 0, Math.PI*2);
      ctx.stroke();
      // spokes
      ctx.lineWidth = 1.5;
      for (let a=0;a<4;a++){
        const ra=a*Math.PI/2;
        ctx.beginPath();
        ctx.moveTo(wx,8);
        ctx.lineTo(wx+Math.cos(ra)*9,8+Math.sin(ra)*9);
        ctx.stroke();
      }
      ctx.lineWidth = 4;
    });
    ctx.restore();
  }

  function accent(c) { return c; }

  function tick() {
    raf = requestAnimationFrame(tick);
    if (state === 'start') {
      drawBg(0);
      startMsg(ctx, W, H, opts.title || 'MOTO X3M', 'ESPAÇO / CLIQUE para iniciar');
      return;
    }
    if (state !== 'play') {
      drawBg(camX);
      if (state === 'dead') gameOver(ctx, W, H, score, ()=>{});
      if (state === 'win') {
        ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#ffd700';ctx.font=`bold ${W/12}px Orbitron,monospace`;ctx.textAlign='center';
        ctx.fillText('NÍVEL COMPLETO!',W/2,H/2-20);
        ctx.fillStyle='#00d4ff';ctx.font=`${W/24}px Orbitron,monospace`;
        ctx.fillText('Score: '+score,W/2,H/2+20);
        ctx.fillStyle='#7a92aa';ctx.font=`${W/32}px Rajdhani,sans-serif`;
        ctx.fillText('ESPAÇO para próximo nível',W/2,H/2+W/14+10);
      }
      return;
    }

    // PHYSICS
    const b = bike;
    const GRAV = 0.5, THRUST = 0.4, FRIC = 0.97, ANG = 0.05;
    if (b.throttle) b.vx += Math.cos(b.angle)*THRUST;
    if (b.brake) b.vx -= 0.3;
    b.vy += GRAV;
    if (b.leanL) b.angVel -= ANG;
    if (b.leanR) b.angVel += ANG;
    b.angVel *= 0.88;
    b.angle += b.angVel;
    b.angle = Math.max(-Math.PI/2, Math.min(Math.PI/2, b.angle));
    b.vx *= FRIC;
    b.x += b.vx; b.y += b.vy;

    // ground collision
    const gy = getY(segments, b.x);
    if (b.y >= gy - 20) {
      b.y = gy - 20;
      b.vy *= -0.15;
      b.onGround = true;
      b.angVel *= 0.7;
      // slope angle
      const gyl = getY(segments, b.x-10);
      const gyr = getY(segments, b.x+10);
      const slope = Math.atan2(gyr-gyl, 20);
      b.angle += (slope - b.angle) * 0.25;
    } else {
      b.onGround = false;
    }

    // death conditions
    if (b.y > H + 100) { die(); return; }
    if (Math.abs(b.angle) > 1.4) { die(); return; }

    // obstacles collision
    for (const o of obstacles) {
      const dx = b.x - o.x, dy = b.y - o.y;
      if (Math.abs(dx) < o.w/2 + 15 && Math.abs(dy) < o.h/2 + 15) { die(); return; }
    }

    // coins
    for (const coin of coins) {
      if (!coin.got && Math.hypot(b.x-coin.x, b.y-coin.y) < 20) { coin.got=true; score+=100; }
    }

    // win
    if (b.x > segments[segments.length-1].x - 100) { win(); return; }

    // camera
    camX += (b.x - W/3 - camX) * 0.08;

    // DRAW
    drawBg(camX);
  }

  function drawBg(ox) {
    // sky
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, theme.sky); grad.addColorStop(1, '#111');
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
    // stars
    ctx.fillStyle='rgba(255,255,255,.6)';
    for (const s of stars) ctx.fillRect(s.x-ox*0.1,s.y,1.5,1.5);
    // segments
    drawGround(ox);
    // obstacles
    for (const o of obstacles) {
      ctx.fillStyle = o.color || '#ff3355';
      ctx.shadowColor = o.color || '#ff3355';
      ctx.shadowBlur = 8;
      ctx.fillRect(o.x - o.w/2 - ox, o.y - o.h/2, o.w, o.h);
      ctx.shadowBlur = 0;
    }
    // coins
    for (const coin of coins) {
      if (coin.got) continue;
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(coin.x-ox, coin.y, coin.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    // finish flag
    const fx = segments[segments.length-1].x - 80 - ox;
    const fy = getY(segments, segments[segments.length-1].x-80);
    ctx.fillStyle='#fff'; ctx.fillRect(fx, fy-60, 3, 60);
    ctx.fillStyle='#ffd700'; ctx.fillRect(fx+3, fy-60, 25, 15);
    // bike
    drawBike(bike.x-ox, bike.y, bike.angle, state==='dead');
    // HUD
    hud(ctx, score, lives, W, `LVL ${level+1}`);
  }

  function die() {
    lives--;
    if (lives <= 0) { state='dead'; }
    else { reset(); }
  }

  function win() {
    state='win'; score += 500*(level+1);
  }

  // INPUT
  function handleKey(code, down) {
    if (code==='ArrowRight'||code==='KeyD') bike.throttle=down;
    if (code==='ArrowLeft'||code==='KeyA') bike.brake=down;
    if (code==='ArrowUp'||code==='KeyW') bike.leanL=down;
    if (code==='ArrowDown'||code==='KeyS') bike.leanR=down;
    if (down && (code==='Space')) {
      if (state==='start') reset();
      else if (state==='dead') { lives=3; score=0; level=0; reset(); }
      else if (state==='win') { level++; reset(); }
    }
  }
  const kd = e => { handleKey(e.code,true); if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); };
  const ku = e => handleKey(e.code,false);
  document.addEventListener('keydown',kd);
  document.addEventListener('keyup',ku);
  c.addEventListener('click', () => {
    if (state==='start') reset();
    else if (state==='dead') { lives=3; score=0; level=0; reset(); }
    else if (state==='win') { level++; reset(); }
    else bike.throttle = true;
  });
  c.addEventListener('mousedown', ()=>{ bike.throttle=true; });
  c.addEventListener('mouseup', ()=>{ bike.throttle=false; });

  tick();
  return () => { cancelAnimationFrame(raf); document.removeEventListener('keydown',kd); document.removeEventListener('keyup',ku); };
}

// ── DRIFT BOSS ──────────────────────────────────────────────────────────────
ENGINES.driftBoss = function(container) {
  const W=600, H=700;
  const c = makeCanvas(W, H, '#0a0510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';
  container.appendChild(c);
  const ctx = c.getContext('2d');
  let car, platforms, score, dist, state, raf;
  function reset() {
    car = {x:W/2,y:H-180,w:44,h:26,vx:2.5,vy:0,angle:0,onPlat:false};
    platforms = [{x:0,y:H-130,w:W,h:30,type:'start'}];
    for(let i=0;i<8;i++) addPlat();
    score=0; dist=0; state='play';
  }
  function addPlat() {
    const last = platforms[platforms.length-1];
    const gap = 60+Math.random()*80;
    const w = 120+Math.random()*160;
    const y = last.y + (Math.random()-.45)*120;
    platforms.push({x:last.x+last.w+gap, y:Math.max(200,Math.min(H-100,y)), w, h:20, type:'plat'});
  }
  function tick() {
    raf=requestAnimationFrame(tick);
    if(state!=='play'){
      drawGame();
      if(state==='dead') gameOver(ctx,W,H,score,reset);
      return;
    }
    // input
    if(keys['ArrowRight']||keys['KeyD']||keys['Space']) car.angle+=0.04;
    if(keys['ArrowLeft']||keys['KeyA']) car.angle-=0.04;
    // physics
    car.vy+=0.4; car.x+=car.vx; car.y+=car.vy;
    // platform collision
    car.onPlat=false;
    for(const p of platforms){
      if(car.x>p.x&&car.x<p.x+p.w&&car.y+13>p.y&&car.y+13<p.y+p.h+20&&car.vy>=0){
        car.y=p.y-13; car.vy=0; car.onPlat=true;
      }
    }
    // drift - car follows angle
    car.vx += (Math.cos(car.angle)*2.5 - car.vx)*0.08;
    if(car.y>H+50){state='dead';return;}
    // scroll
    const camX = car.x - W*0.35;
    while(platforms[platforms.length-1].x - camX < W+200) addPlat();
    platforms = platforms.filter(p=>p.x-camX>-300);
    dist++; if(dist%30===0) score+=10;
    drawGame();
  }
  function drawGame(){
    const camX=car.x-W*0.35;
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#050010'); grad.addColorStop(1,'#0a001a');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // platforms
    for(const p of platforms){
      const px=p.x-camX;
      ctx.fillStyle='#1a1a3a';
      ctx.fillRect(px,p.y,p.w,p.h);
      ctx.fillStyle='#00d4ff';
      ctx.fillRect(px,p.y,p.w,3);
    }
    // car
    ctx.save();
    ctx.translate(car.x-camX,car.y);
    ctx.rotate(car.angle);
    ctx.fillStyle='#00d4ff';
    ctx.shadowColor='#00d4ff'; ctx.shadowBlur=12;
    ctx.fillRect(-car.w/2,-car.h/2,car.w,car.h);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';
    ctx.fillRect(-car.w/2+4,-car.h/2+3,car.w-8,8);
    // wheels
    ctx.fillStyle='#333';
    [[-car.w/2-4,-car.h/2],[car.w/2-4,-car.h/2],[-car.w/2-4,car.h/2-6],[car.w/2-4,car.h/2-6]].forEach(([wx,wy])=>{
      ctx.fillRect(wx,wy,8,6);
    });
    ctx.restore();
    hud(ctx,score,null,W);
    if(state!=='play'){
      gameOver(ctx,W,H,score,reset);
    }
  }
  reset();
  c.addEventListener('click',()=>{ if(state==='dead'){score=0;reset();}});
  const kd=e=>{if(e.code==='Space'){if(state==='dead'){score=0;reset();}e.preventDefault();}};
  document.addEventListener('keydown',kd);
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── SLOPE ────────────────────────────────────────────────────────────────────
ENGINES.slope = function(container) {
  const W=600,H=800;
  const c=makeCanvas(W,H,'#020210');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const COLS=8, CW=W/COLS, SPEED_INC=0.003;
  let ball,tiles,speed,score,state,raf;
  function reset(){
    ball={x:W/2,y:H*0.3,r:18,vx:0,vy:0,dead:false};
    tiles=[]; speed=5; score=0; state='start';
    for(let y=-H;y<H*2;y+=80) addRow(y);
  }
  function addRow(y){
    const row={y,cells:[]};
    // always have at least 3 open cells
    const holes=new Set();
    while(holes.size<3) holes.add(Math.floor(Math.random()*COLS));
    for(let i=0;i<COLS;i++) row.cells.push(!holes.has(i));
    tiles.push(row);
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){
      drawBg();
      startMsg(ctx,W,H,'SLOPE','← → para mover · ESPAÇO para iniciar');
      return;
    }
    if(state==='dead'){drawBg();gameOver(ctx,W,H,Math.floor(score),reset);return;}
    // move
    if(keys['ArrowLeft']||keys['KeyA']) ball.vx-=0.4;
    if(keys['ArrowRight']||keys['KeyD']) ball.vx+=0.4;
    ball.vx*=0.92;
    ball.x+=ball.vx;
    ball.y+=speed;
    score+=speed*0.05;
    speed+=SPEED_INC;
    // wrap
    if(ball.x<ball.r) ball.x=W-ball.r;
    if(ball.x>W-ball.r) ball.x=ball.r;
    // scroll tiles
    for(const t of tiles) t.y-=speed;
    tiles=tiles.filter(t=>t.y>-100);
    while(tiles.length<20) addRow(tiles[tiles.length-1].y+80);
    // collision
    for(const t of tiles){
      const row=Math.floor(t.y/80);
      for(let i=0;i<COLS;i++){
        if(!t.cells[i]) continue;
        const tx=i*CW, ty=t.y;
        if(ball.x+ball.r>tx+4&&ball.x-ball.r<tx+CW-4&&ball.y+ball.r>ty&&ball.y-ball.r<ty+30){
          state='dead'; return;
        }
      }
    }
    drawBg();
  }
  function drawBg(){
    ctx.fillStyle='#020210'; ctx.fillRect(0,0,W,H);
    for(const t of tiles){
      for(let i=0;i<COLS;i++){
        if(!t.cells[i]) continue;
        const tx=i*CW, ty=t.y;
        const g=ctx.createLinearGradient(tx,ty,tx+CW,ty);
        g.addColorStop(0,'#0a0a3a'); g.addColorStop(1,'#1a1a5a');
        ctx.fillStyle=g;
        ctx.fillRect(tx+2,ty,CW-4,80);
        ctx.fillStyle='rgba(0,212,255,.3)';
        ctx.fillRect(tx+2,ty,CW-4,3);
      }
    }
    // ball
    const gr=ctx.createRadialGradient(ball.x-5,ball.y-5,2,ball.x,ball.y,ball.r);
    gr.addColorStop(0,'#fff'); gr.addColorStop(1,'#ff3355');
    ctx.fillStyle=gr;
    ctx.shadowColor='#ff3355'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    hud(ctx,Math.floor(score),null,W);
  }
  reset();
  const kd=e=>{
    if(e.code==='Space'){
      if(state==='start') state='play';
      else if(state==='dead'){score=0;reset();}
      e.preventDefault();
    }
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') state='play'; else if(state==='dead'){score=0;reset();}});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── TUNNEL RUSH ──────────────────────────────────────────────────────────────
ENGINES.tunnelRush = function(container) {
  const W=700,H=500;
  const c=makeCanvas(W,H,'#000');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const CX=W/2,CY=H/2,R=200;
  let angle,speed,score,state,rings,hue,raf;
  function reset(){angle=0;speed=1.5;score=0;state='start';rings=[];hue=0;
    for(let z=0;z<20;z++) addRing(z*150+500);}
  function addRing(z){
    const gaps=Math.max(1,3-Math.floor(score/1000));
    const arc=Math.PI*2/6;
    const start=Math.random()*Math.PI*2;
    const blocked=[];
    for(let i=0;i<6;i++){
      if(Math.random()<0.45&&blocked.length<6-gaps) blocked.push(i);
    }
    rings.push({z,blocked,start,hue:hue%360});
    hue+=15;
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'TUNNEL RUSH','← → para mover');return;}
    if(state==='dead'){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);gameOver(ctx,W,H,Math.floor(score),reset);return;}
    if(keys['ArrowLeft']||keys['KeyA']) angle-=0.045*speed;
    if(keys['ArrowRight']||keys['KeyD']) angle+=0.045*speed;
    score+=speed*0.05; speed=1.5+score*0.0008;
    for(const r of rings) r.z-=speed*4;
    rings=rings.filter(r=>r.z>-50);
    while(rings.length<20) addRing(rings[rings.length-1].z+150);
    // draw
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    for(const ring of [...rings].reverse()){
      if(ring.z<10) continue;
      const scale=500/ring.z;
      const rr=R*scale;
      const arc=Math.PI*2/6;
      ctx.lineWidth=rr*0.22;
      for(let i=0;i<6;i++){
        if(ring.blocked.includes(i)) continue;
        const a1=ring.start+i*arc, a2=a1+arc;
        ctx.beginPath();
        ctx.arc(CX,CY,rr,a1,a2);
        ctx.strokeStyle=`hsl(${ring.hue+i*15},100%,55%)`;
        ctx.stroke();
      }
      // check collision (near ring)
      if(ring.z<80&&ring.z>20){
        const pa=((angle%( Math.PI*2))+Math.PI*2)%(Math.PI*2);
        for(let i=0;i<6;i++){
          if(!ring.blocked.includes(i)) continue;
          let a1=(ring.start+i*arc+Math.PI*2)%(Math.PI*2);
          let a2=(a1+arc)%(Math.PI*2);
          let hit=false;
          if(a1<a2) hit=pa>=a1&&pa<=a2;
          else hit=pa>=a1||pa<=a2;
          if(hit){state='dead';return;}
        }
      }
    }
    // player
    const px=CX+Math.cos(angle)*R*0.85, py=CY+Math.sin(angle)*R*0.85;
    ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.arc(px,py,10,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    hud(ctx,Math.floor(score),null,W);
  }
  reset();
  const kd=e=>{
    if(e.code==='Space'){if(state==='start') state='play'; else if(state==='dead'){score=0;reset();}e.preventDefault();}
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') state='play'; else if(state==='dead'){score=0;reset();}});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── DINO RUN ─────────────────────────────────────────────────────────────────
ENGINES.dinoRun = function(container) {
  const W=700,H=300;
  const c=makeCanvas(W,H,'#0a0a10');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const GY=220;
  let dino,obs,score,speed,state,raf,frame;
  function reset(){
    dino={x:80,y:GY,vy:0,onG:true,w:38,h:48};
    obs=[];score=0;speed=5;state='start';frame=0;
  }
  function jump(){
    if(state==='start') state='play';
    else if(state==='dead'){score=0;reset();state='play';}
    else if(dino.onG&&state==='play'){dino.vy=-14;dino.onG=false;}
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#0a0a10';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'DINO RUN','ESPAÇO / CLIQUE para pular');return;}
    if(state==='dead'){ctx.fillStyle='#0a0a10';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(0,212,255,.08)';ctx.fillRect(0,GY+48,W,10);
      gameOver(ctx,W,H,Math.floor(score),reset);return;}
    frame++;
    score+=speed*0.05; speed=5+score*0.003;
    // dino
    dino.vy+=0.7; dino.y+=dino.vy;
    if(dino.y>=GY){dino.y=GY;dino.vy=0;dino.onG=true;}
    // spawn
    if(obs.length===0||obs[obs.length-1].x<W-200-Math.random()*300){
      const h=30+Math.random()*50;
      obs.push({x:W,y:GY+dino.h-h,w:22+Math.random()*20,h});
    }
    for(const o of obs) o.x-=speed;
    obs=obs.filter(o=>o.x>-60);
    // collision
    for(const o of obs){
      if(dino.x+dino.w-8>o.x&&dino.x+8<o.x+o.w&&dino.y+dino.h>o.y){state='dead';return;}
    }
    // draw
    ctx.fillStyle='#0a0a10'; ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle='rgba(0,212,255,.25)'; ctx.fillRect(0,GY+dino.h,W,3);
    // obstacles
    obs.forEach(o=>{
      ctx.fillStyle='#ff3355'; ctx.shadowColor='#ff3355'; ctx.shadowBlur=8;
      ctx.fillRect(o.x,o.y,o.w,o.h); ctx.shadowBlur=0;
    });
    // dino
    ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=10;
    ctx.fillRect(dino.x,dino.y,dino.w,dino.h-10);
    ctx.fillRect(dino.x+dino.w*.4,dino.y-14,dino.w*.6,18);
    ctx.fillStyle='#050508';
    ctx.fillRect(dino.x+dino.w*.78,dino.y-9,5,5);
    ctx.shadowBlur=0;
    // legs
    const lf=dino.onG?Math.floor(frame/5)%2:0;
    ctx.fillStyle='#00d4ff';
    ctx.fillRect(dino.x+5,dino.y+dino.h-10,12,10+lf*4);
    ctx.fillRect(dino.x+20,dino.y+dino.h-10,12,10+(1-lf)*4);
    hud(ctx,Math.floor(score),null,W);
  }
  reset();
  const kd=e=>{if(e.code==='Space'||e.code==='ArrowUp'){jump();e.preventDefault();}};
  document.addEventListener('keydown',kd);
  c.addEventListener('click',jump);
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── SUBWAY DASH ──────────────────────────────────────────────────────────────
ENGINES.subwayDash = function(container) {
  const W=450,H=700;
  const c=makeCanvas(W,H,'#0a050f');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const LANES=[W/4,W/2,3*W/4];
  let lane,targetX,obs,coins,speed,score,state,raf;
  function reset(){lane=1;targetX=LANES[1];obs=[];coins=[];speed=4;score=0;state='start';}
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#0a050f';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'SUBWAY DASH','← → para mudar de faixa');return;}
    if(state==='dead'){ctx.fillStyle='#0a050f';ctx.fillRect(0,0,W,H);gameOver(ctx,W,H,Math.floor(score),reset);return;}
    // player pos
    const px=LANES[lane];
    const py=H-120;
    // spawn
    if(obs.length===0||obs[obs.length-1].y<H-280-Math.random()*200){
      const ln=Math.floor(Math.random()*3);
      obs.push({x:LANES[ln],y:-60,lane:ln,w:40,h:60});
    }
    if(Math.random()<0.02) coins.push({x:LANES[Math.floor(Math.random()*3)],y:-30,r:12,got:false});
    for(const o of obs) o.y+=speed;
    for(const co of coins) co.y+=speed;
    speed=4+score*0.002; score+=speed*0.04;
    obs=obs.filter(o=>o.y<H+80);
    coins=coins.filter(co=>co.y<H+40);
    // coin collect
    for(const co of coins){ if(!co.got&&Math.abs(co.x-px)<25&&Math.abs(co.y-py)<25){co.got=true;score+=50;}}
    // collision
    for(const o of obs){if(o.lane===lane&&o.y+o.h>py-40&&o.y<py+40){state='dead';return;}}
    // draw
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0a050f'); grad.addColorStop(1,'#1a0a2a');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // tracks
    LANES.forEach(lx=>{
      ctx.fillStyle='rgba(255,255,255,.06)';
      ctx.fillRect(lx-30,0,60,H);
    });
    // lane dividers (moving)
    ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=2; ctx.setLineDash([30,30]);
    ctx.lineDashOffset=-score*3;
    [W/4+30, W/2+30].forEach(lx=>{ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();});
    ctx.setLineDash([]);
    // obstacles
    obs.forEach(o=>{
      ctx.fillStyle='#ff3355'; ctx.shadowColor='#ff3355'; ctx.shadowBlur=8;
      ctx.fillRect(o.x-o.w/2,o.y,o.w,o.h);
      ctx.shadowBlur=0;
    });
    // coins
    coins.forEach(co=>{
      if(co.got) return;
      ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(co.x,co.y,co.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    });
    // player
    ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=14;
    ctx.fillRect(px-18,py-45,36,55);
    ctx.fillStyle='#fff'; ctx.fillRect(px-18,py-45,36,20);
    ctx.shadowBlur=0;
    hud(ctx,Math.floor(score),null,W);
  }
  reset();
  const kd=e=>{
    if(state==='start'){state='play';return;}
    if(state==='dead'){score=0;reset();state='play';return;}
    if(e.code==='ArrowLeft'&&lane>0){lane--;e.preventDefault();}
    if(e.code==='ArrowRight'&&lane<2){lane++;e.preventDefault();}
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',e=>{
    const r=c.getBoundingClientRect();
    const cx=(e.clientX-r.left)/r.width*W;
    if(state!=='play'){state='play';return;}
    if(cx<W/3&&lane>0) lane--;
    else if(cx>W*2/3&&lane<2) lane++;
  });
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── SPACE SHOOTER ─────────────────────────────────────────────────────────────
ENGINES.spaceShooter = function(container) {
  const W=500,H=650;
  const c=makeCanvas(W,H,'#000010');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let ship,bullets,enemies,particles,score,lives,wave,raf,shootCD,state;
  function reset(){
    ship={x:W/2,y:H-80,w:32,h:26};
    bullets=[];enemies=[];particles=[];
    score=0;lives=3;wave=1;shootCD=0;state='play';
    spawnWave();
  }
  function spawnWave(){
    for(let r=0;r<Math.min(3+wave,5);r++)
      for(let c2=0;c2<Math.min(6+wave,10);c2++)
        enemies.push({x:50+c2*50,y:50+r*45,w:28,h:20,hp:1,dir:1,color:['#ff3355','#ff8800','#aa44ff','#00ff88','#ffd700'][r%5]});
  }
  function ptcl(x,y,col){for(let i=0;i<8;i++) particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:25,col});}
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'SPACE SHOOTER','← → Mover · ESPAÇO Atirar');return;}
    if(state==='dead'){ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);gameOver(ctx,W,H,score,reset);return;}
    // input
    if(keys['ArrowLeft']||keys['KeyA']) ship.x=Math.max(ship.w/2,ship.x-5);
    if(keys['ArrowRight']||keys['KeyD']) ship.x=Math.min(W-ship.w/2,ship.x+5);
    if((keys['Space']||keys['KeyZ'])&&shootCD<=0){
      bullets.push({x:ship.x,y:ship.y-ship.h/2,vy:-10,enemy:false});
      shootCD=12;
    }
    if(shootCD>0) shootCD--;
    // enemies
    let wall=false;
    enemies.forEach(e=>{e.x+=e.dir*1.2;if(e.x<25||e.x>W-25) wall=true;});
    if(wall) enemies.forEach(e=>{e.dir*=-1;e.y+=18;});
    // enemy shoot
    if(enemies.length&&Math.random()<0.015+wave*0.003){
      const e=enemies[Math.floor(Math.random()*enemies.length)];
      bullets.push({x:e.x,y:e.y+e.h,vy:4+wave*0.5,enemy:true});
    }
    // bullets
    bullets.forEach(b=>b.y+=b.vy);
    bullets=bullets.filter(b=>b.y>-20&&b.y<H+20);
    // hit enemies
    bullets.filter(b=>!b.enemy).forEach(b=>{
      enemies.forEach(e=>{
        if(b.x>e.x-e.w/2&&b.x<e.x+e.w/2&&b.y>e.y-e.h/2&&b.y<e.y+e.h/2){
          e.hp--;b.y=-999;if(e.hp<=0){ptcl(e.x,e.y,e.color);e.y=9999;score+=10*(wave);}
        }
      });
    });
    enemies=enemies.filter(e=>e.y<H);
    // hit ship
    bullets.filter(b=>b.enemy).forEach(b=>{
      if(Math.abs(b.x-ship.x)<20&&Math.abs(b.y-ship.y)<20){b.y=-999;lives--;ptcl(ship.x,ship.y,'#00d4ff');}
    });
    if(lives<=0){state='dead';return;}
    // next wave
    if(!enemies.length){wave++;spawnWave();}
    // particles
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
    particles=particles.filter(p=>p.life>0);
    // draw
    ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
    // stars
    ctx.fillStyle='rgba(255,255,255,.4)';
    for(let i=0;i<60;i++) ctx.fillRect((i*73)%W,(i*137+score*2)%H,1.5,1.5);
    // particles
    particles.forEach(p=>{ctx.globalAlpha=p.life/25;ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,3,3);});
    ctx.globalAlpha=1;
    // enemies
    enemies.forEach(e=>{
      ctx.fillStyle=e.color; ctx.shadowColor=e.color; ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(e.x,e.y+e.h);ctx.lineTo(e.x-e.w/2,e.y);ctx.lineTo(e.x+e.w/2,e.y);ctx.fill();
      ctx.shadowBlur=0;
    });
    // bullets
    bullets.forEach(b=>{
      ctx.fillStyle=b.enemy?'#ff3355':'#00d4ff';
      ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=6;
      ctx.fillRect(b.x-2,b.y-6,4,12); ctx.shadowBlur=0;
    });
    // ship
    ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=14;
    ctx.beginPath();ctx.moveTo(ship.x,ship.y-ship.h/2);ctx.lineTo(ship.x-ship.w/2,ship.y+ship.h/2);ctx.lineTo(ship.x+ship.w/2,ship.y+ship.h/2);ctx.fill();
    ctx.shadowBlur=0;
    hud(ctx,score,lives,W,`WAVE ${wave}`);
  }
  state='start';
  const kd=e=>{
    if(state==='start'){reset();return;}
    if(state==='dead'){score=0;reset();return;}
    if(['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') reset(); else if(state==='dead'){score=0;reset();}});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── SNAKE ─────────────────────────────────────────────────────────────────────
ENGINES.snake = function(container) {
  const SZ=22,W=26,H=20;
  const c=makeCanvas(W*SZ,H*SZ,'#050510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let snake,dir,nextDir,food,score,state,raf;
  function reset(){snake=[{x:13,y:10}];dir={x:1,y:0};nextDir={x:1,y:0};food=rndFood();score=0;state='play';}
  function rndFood(){let f;do{f={x:Math.floor(Math.random()*W),y:Math.floor(Math.random()*H)}}while(snake.some(s=>s.x===f.x&&s.y===f.y));return f;}
  let interval;
  function step(){
    if(state!=='play') return;
    dir=nextDir;
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)){state='dead';return;}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score+=10;food=rndFood();}else snake.pop();
    clearInterval(interval);
    interval=setInterval(step,Math.max(60,150-Math.floor(score/50)*8));
  }
  function draw(){
    ctx.fillStyle='#050510'; ctx.fillRect(0,0,W*SZ,H*SZ);
    // grid
    ctx.strokeStyle='rgba(0,212,255,.05)'; ctx.lineWidth=1;
    for(let x=0;x<=W;x++){ctx.beginPath();ctx.moveTo(x*SZ,0);ctx.lineTo(x*SZ,H*SZ);ctx.stroke();}
    for(let y=0;y<=H;y++){ctx.beginPath();ctx.moveTo(0,y*SZ);ctx.lineTo(W*SZ,y*SZ);ctx.stroke();}
    // food
    ctx.fillStyle='#ff3355'; ctx.shadowColor='#ff3355'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    // snake
    snake.forEach((s,i)=>{
      const col=i===0?'#00d4ff':'#0088aa';
      ctx.fillStyle=col; if(i===0){ctx.shadowColor=col;ctx.shadowBlur=10;}
      ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2); ctx.shadowBlur=0;
    });
    hud(ctx,score,null,W*SZ);
    if(state==='dead') gameOver(ctx,W*SZ,H*SZ,score,()=>{});
    if(state==='start') startMsg(ctx,W*SZ,H*SZ,'SNAKE','WASD / Setas para mover');
  }
  function drawLoop(){raf=requestAnimationFrame(drawLoop);draw();}
  reset(); state='start';
  drawLoop();
  const kd=e=>{
    const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
      KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
    if(m[e.code]){const d=m[e.code];if(d.x!==-dir.x||d.y!==-dir.y)nextDir=d;e.preventDefault();}
    if(e.code==='Space'){if(state==='start'){state='play';interval=setInterval(step,150);}
      else if(state==='dead'){clearInterval(interval);reset();interval=setInterval(step,150);}e.preventDefault();}
  };
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start'){state='play';interval=setInterval(step,150);}
    else if(state==='dead'){clearInterval(interval);reset();interval=setInterval(step,150);}});
  return()=>{cancelAnimationFrame(raf);clearInterval(interval);document.removeEventListener('keydown',kd);};
};

// ── TETRIS ────────────────────────────────────────────────────────────────────
ENGINES.tetris = function(container) {
  const BW=10,BH=20,BS=28;
  const W=BW*BS+160, H=BH*BS;
  const c=makeCanvas(W,H,'#050510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const PIECES=[{s:[[1,1,1,1]],c:'#00d4ff'},{s:[[1,1],[1,1]],c:'#ffd700'},{s:[[0,1,0],[1,1,1]],c:'#aa44ff'},
    {s:[[1,0,0],[1,1,1]],c:'#ff8800'},{s:[[0,0,1],[1,1,1]],c:'#00d4ff'},{s:[[1,1,0],[0,1,1]],c:'#ff3355'},{s:[[0,1,1],[1,1,0]],c:'#00ff88'}];
  let board,piece,score,lines,state,raf,lastDrop;
  function newBoard(){return Array.from({length:BH},()=>Array(BW).fill(0));}
  function newPiece(){const p=PIECES[Math.floor(Math.random()*PIECES.length)];return{s:p.s,c:p.c,x:Math.floor(BW/2)-Math.floor(p.s[0].length/2),y:0};}
  function rot(s){return s[0].map((_,i)=>s.map(r=>r[i]).reverse());}
  function valid(sh,ox,oy){return sh.every((row,r)=>row.every((v,col2)=>{if(!v)return true;const nx=ox+col2,ny=oy+r;return nx>=0&&nx<BW&&ny<BH&&(ny<0||!board[ny][nx]);}));}
  function place(){piece.s.forEach((row,r)=>row.forEach((v,col2)=>{if(v&&piece.y+r>=0)board[piece.y+r][piece.x+col2]=piece.c;}));}
  function clearLines(){let cl=0;for(let r=BH-1;r>=0;r--){if(board[r].every(v=>v)){board.splice(r,1);board.unshift(Array(BW).fill(0));cl++;r++;}}
    if(cl){lines+=cl;score+=cl*100*cl;}}
  function init(){board=newBoard();piece=newPiece();score=0;lines=0;state='play';lastDrop=0;}
  function draw(ts){
    ctx.fillStyle='#050510'; ctx.fillRect(0,0,W,H);
    // grid
    ctx.strokeStyle='rgba(0,212,255,.06)'; ctx.lineWidth=1;
    for(let x=0;x<=BW;x++){ctx.beginPath();ctx.moveTo(x*BS,0);ctx.lineTo(x*BS,BH*BS);ctx.stroke();}
    for(let y=0;y<=BH;y++){ctx.beginPath();ctx.moveTo(0,y*BS);ctx.lineTo(BW*BS,y*BS);ctx.stroke();}
    // board
    board.forEach((row,r)=>row.forEach((v,col2)=>{if(v){ctx.fillStyle=v;ctx.shadowColor=v;ctx.shadowBlur=4;ctx.fillRect(col2*BS+1,r*BS+1,BS-2,BS-2);ctx.shadowBlur=0;}}));
    // piece
    piece.s.forEach((row,r)=>row.forEach((v,col2)=>{if(v){ctx.fillStyle=piece.c;ctx.shadowColor=piece.c;ctx.shadowBlur=8;ctx.fillRect((piece.x+col2)*BS+1,(piece.y+r)*BS+1,BS-2,BS-2);ctx.shadowBlur=0;}}));
    // sidebar
    const sx=BW*BS+10;
    ctx.fillStyle='#00d4ff'; ctx.font='bold 13px Orbitron,monospace'; ctx.textAlign='left';
    ctx.fillText('SCORE',sx,40); ctx.fillStyle='#eef4ff'; ctx.font='18px Orbitron,monospace'; ctx.fillText(score,sx,62);
    ctx.fillStyle='#00d4ff'; ctx.font='bold 13px Orbitron,monospace'; ctx.fillText('LINHAS',sx,100); ctx.fillStyle='#eef4ff'; ctx.font='18px Orbitron,monospace'; ctx.fillText(lines,sx,122);
    ctx.fillStyle='#7a92aa'; ctx.font='11px Rajdhani,sans-serif';
    ['←→ Mover','↑ Girar','↓ Aceler','SPC Drop'].forEach((t,i)=>ctx.fillText(t,sx,180+i*22));
    if(state==='start') startMsg(ctx,BW*BS,H,'TETRIS','ESPAÇO para iniciar');
    if(state==='dead') gameOver(ctx,BW*BS,H,score,()=>{});
  }
  state='start';
  function loop(ts){
    raf=requestAnimationFrame(loop);
    if(state==='play'&&ts-lastDrop>Math.max(80,500-Math.floor(lines/5)*40)){
      lastDrop=ts;
      if(valid(piece.s,piece.x,piece.y+1)) piece.y++;
      else{place();clearLines();piece=newPiece();if(!valid(piece.s,piece.x,piece.y)) state='dead';}
    }
    draw(ts);
  }
  raf=requestAnimationFrame(loop);
  const kd=e=>{
    if(state==='start'&&e.code==='Space'){init();return;}
    if(state==='dead'&&e.code==='Space'){init();return;}
    if(state!=='play') return;
    if(e.code==='ArrowLeft'&&valid(piece.s,piece.x-1,piece.y)) piece.x--;
    else if(e.code==='ArrowRight'&&valid(piece.s,piece.x+1,piece.y)) piece.x++;
    else if(e.code==='ArrowDown'&&valid(piece.s,piece.x,piece.y+1)) piece.y++;
    else if(e.code==='ArrowUp'){const r=rot(piece.s);if(valid(r,piece.x,piece.y)) piece.s=r;}
    else if(e.code==='Space'){while(valid(piece.s,piece.x,piece.y+1)) piece.y++;place();clearLines();piece=newPiece();if(!valid(piece.s,piece.x,piece.y)) state='dead';}
    if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp','Space'].includes(e.code)) e.preventDefault();
  };
  document.addEventListener('keydown',kd);
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── FLAPPY BIRD ───────────────────────────────────────────────────────────────
ENGINES.flappyBird = function(container) {
  const W=400,H=600;
  const c=makeCanvas(W,H,'#000820');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const GAP=150,PW=55,JUMP=-9;
  let bird,pipes,score,state,raf,pTimer;
  function reset(){bird={y:H/2,vy:0,r:15};pipes=[];score=0;state='start';pTimer=0;}
  function flap(){
    if(state==='start') state='play';
    else if(state==='dead'){reset();state='play';}
    else bird.vy=JUMP;
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state!=='play'){
      draw();
      if(state==='dead') gameOver(ctx,W,H,score,()=>{});
      else startMsg(ctx,W,H,'FLAPPY','Clique / ESPAÇO para voar');
      return;
    }
    bird.vy+=0.45; bird.y+=bird.vy;
    pTimer++;
    if(pTimer>90){pipes.push({x:W,top:60+Math.random()*(H-GAP-120)});pTimer=0;}
    pipes.forEach(p=>{p.x-=3;if(p.x+PW<40&&!p.scored){p.scored=true;score++;}});
    pipes=pipes.filter(p=>p.x>-PW);
    // collision
    if(bird.y-bird.r<0||bird.y+bird.r>H){state='dead';return;}
    for(const p of pipes){
      if(40+bird.r>p.x&&40-bird.r<p.x+PW&&(bird.y-bird.r<p.top||bird.y+bird.r>p.top+GAP)){state='dead';return;}
    }
    draw();
  }
  function draw(){
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#000820'); sky.addColorStop(1,'#001535');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    pipes.forEach(p=>{
      ctx.fillStyle='#003344'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=8;
      ctx.fillRect(p.x,0,PW,p.top);
      ctx.fillRect(p.x,p.top+GAP,PW,H);
      ctx.fillStyle='#004455';
      ctx.fillRect(p.x-5,p.top-16,PW+10,16);
      ctx.fillRect(p.x-5,p.top+GAP,PW+10,16);
      ctx.shadowBlur=0;
    });
    // bird
    ctx.save(); ctx.translate(40,bird.y); ctx.rotate(Math.min(Math.max(bird.vy*.06,-.4),.5));
    ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(0,0,bird.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(-4,-4,7,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
    // score
    ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=10;
    ctx.font='bold 2rem Orbitron,monospace'; ctx.textAlign='center'; ctx.fillText(score,W/2,55); ctx.shadowBlur=0;
  }
  reset();
  const kd=e=>{if(e.code==='Space'){flap();e.preventDefault();}};
  document.addEventListener('keydown',kd);
  c.addEventListener('click',flap);
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── 2048 ─────────────────────────────────────────────────────────────────────
ENGINES.g2048 = function(container) {
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:#050510;gap:16px;padding:20px';
  const scoreEl=document.createElement('div');
  scoreEl.style.cssText='font-family:Orbitron,monospace;color:#00d4ff;font-size:1.2rem;letter-spacing:.15em';
  const board=document.createElement('div');
  board.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:14px;padding:10px;width:min(340px,88vw)';
  const hint=document.createElement('div');
  hint.style.cssText='font-family:Rajdhani,sans-serif;color:#4a6278;font-size:.8rem;letter-spacing:.08em';
  hint.textContent='WASD / Setas para jogar';
  wrap.append(scoreEl,board,hint);
  container.appendChild(wrap);
  const COLORS={'':['#0d0d1a','#555'],'2':['#003344','#00d4ff'],'4':['#004455','#00d4ff'],'8':['#0a3344','#00eeff'],
    '16':['#003322','#00ff88'],'32':['#002233','#00ccff'],'64':['#330022','#ff44aa'],'128':['#332200','#ffaa00'],
    '256':['#003300','#00ff44'],'512':['#110033','#aa44ff'],'1024':['#330011','#ff4466'],'2048':['#001133','#ffd700']};
  let grid,score2;
  function newGrid(){return Array.from({length:4},()=>Array(4).fill(0));}
  function addRandom(g){const empty=[];for(let r=0;r<4;r++)for(let col=0;col<4;col++)if(!g[r][col])empty.push([r,col]);
    if(!empty.length)return;const[r,col]=empty[Math.floor(Math.random()*empty.length)];g[r][col]=Math.random()<.9?2:4;}
  function init(){grid=newGrid();score2=0;addRandom(grid);addRandom(grid);render();}
  function render(){
    scoreEl.textContent='SCORE: '+score2;
    board.innerHTML='';
    for(let r=0;r<4;r++)for(let col=0;col<4;col++){
      const v=grid[r][col],k=v?String(v):'',colors=COLORS[k]||['#220033','#ff44ff'];
      const cell=document.createElement('div');
      cell.style.cssText=`background:${colors[0]};color:${colors[1]};border:1px solid rgba(0,212,255,.15);border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:Orbitron,monospace;font-weight:700;font-size:${v>999?'1rem':v>99?'1.2rem':'1.5rem'};text-shadow:0 0 8px currentColor;transition:all .1s`;
      cell.textContent=v||''; board.appendChild(cell);
    }
  }
  function slide(row){const r=row.filter(v=>v);for(let i=0;i<r.length-1;i++)if(r[i]===r[i+1]){r[i]*=2;score2+=r[i];r.splice(i+1,1);}while(r.length<4)r.push(0);return r;}
  function move(d){
    const old=JSON.stringify(grid);
    if(d==='left') grid=grid.map(r=>slide(r));
    else if(d==='right') grid=grid.map(r=>slide([...r].reverse()).reverse());
    else{
      for(let col=0;col<4;col++){
        let column=grid.map(r=>r[col]);
        const n=d==='up'?slide(column):slide(column.reverse()).reverse();
        n.forEach((v,r)=>grid[r][col]=v);
      }
    }
    if(JSON.stringify(grid)!==old){addRandom(grid);render();}
  }
  init();
  const kd=e=>{
    const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',KeyA:'left',KeyD:'right',KeyW:'up',KeyS:'down'};
    if(m[e.code]){move(m[e.code]);e.preventDefault();}
  };
  document.addEventListener('keydown',kd);
  return()=>document.removeEventListener('keydown',kd);
};

// ── PAC-MAN ───────────────────────────────────────────────────────────────────
ENGINES.pacman = function(container) {
  const SZ=24;
  const MAP_STR=[
    '############################',
    '#............##............#',
    '#.####.#####.##.#####.####.#',
    '#.####.#####.##.#####.####.#',
    '#..........................#',
    '#.####.##.########.##.####.#',
    '#......##....##....##......#',
    '######.##### ## #####.######',
    '     #.##          ##.#     ',
    '######.## ###--### ##.######',
    '      .   #      #   .      ',
    '######.## ######## ##.######',
    '     #.##          ##.#     ',
    '######.## ######## ##.######',
    '#............##............#',
    '#.####.#####.##.#####.####.#',
    '#...##.......  .......##...#',
    '###.##.##.########.##.##.###',
    '#......##....##....##......#',
    '#.##########.##.##########.#',
    '#..........................#',
    '############################',
  ];
  const ROWS=MAP_STR.length, COLS=MAP_STR[0].length;
  const W=COLS*SZ, H=ROWS*SZ+40;
  const c=makeCanvas(W,H,'#000');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let pac,ghosts,dots,score,lives,state,raf,mouthA;
  function initMap(){
    dots=[];
    for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++){
      const ch=MAP_STR[r][col];
      if(ch==='.') dots.push({r,col,big:false,eaten:false});
      if(ch==='o') dots.push({r,col,big:true,eaten:false});
    }
  }
  function isWall(r,col){if(r<0||r>=ROWS||col<0||col>=COLS) return true;return MAP_STR[Math.floor(r)][Math.floor(col)]==='#';}
  function reset(){
    pac={x:14*SZ,y:16*SZ,dx:1,dy:0,nextDx:1,nextDy:0,speed:2,powered:0};
    ghosts=[{x:13*SZ,y:11*SZ,dx:1,dy:0,col:'#ff3355',scared:false},
            {x:14*SZ,y:11*SZ,dx:-1,dy:0,col:'#ff8800',scared:false},
            {x:15*SZ,y:11*SZ,dx:0,dy:1,col:'#aa44ff',scared:false},
            {x:16*SZ,y:11*SZ,dx:0,dy:-1,col:'#00ff88',scared:false}];
    score=0;lives=3;mouthA=0;state='play';
    initMap();
  }
  function tryMove(x,y,dx,dy,spd){
    const nx=x+dx*spd, ny=y+dy*spd;
    const gr=ny/SZ, gc=nx/SZ;
    if(!isWall(gr,gc) && !isWall(gr+0.9,gc) && !isWall(gr,gc+0.9) && !isWall(gr+0.9,gc+0.9)) return{x:nx,y:ny};
    return null;
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'PAC-MAN','Setas para mover');return;}
    if(state==='dead'){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);drawMap();gameOver(ctx,W,H,score,reset);return;}
    mouthA+=0.18;
    // pac move
    const next=tryMove(pac.x,pac.y,pac.nextDx,pac.nextDy,pac.speed);
    if(next){pac.x=next.x;pac.y=next.y;pac.dx=pac.nextDx;pac.dy=pac.nextDy;}
    else{const fwd=tryMove(pac.x,pac.y,pac.dx,pac.dy,pac.speed);if(fwd){pac.x=fwd.x;pac.y=fwd.y;}}
    pac.x=((pac.x%W)+W)%W;
    // dots
    const pr=Math.floor(pac.y/SZ), pc2=Math.floor(pac.x/SZ);
    for(const d of dots){if(!d.eaten&&d.r===pr&&d.col===pc2){d.eaten=true;score+=d.big?50:10;if(d.big){ghosts.forEach(g=>g.scared=true);pac.powered=200;}}}
    if(pac.powered>0){pac.powered--;if(pac.powered===0) ghosts.forEach(g=>g.scared=false);}
    // ghosts
    for(const g of ghosts){
      // simple random AI
      const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
      const valid2=dirs.filter(d=>{
        if(d.dx===-g.dx&&d.dy===-g.dy) return false;
        return !isWall((g.y+d.dy*g.speed)/SZ,(g.x+d.dx*g.speed)/SZ);
      });
      if(valid2.length){
        let chosen;
        if(g.scared) chosen=valid2[Math.floor(Math.random()*valid2.length)];
        else{const tx=pac.x,ty=pac.y;chosen=valid2.reduce((best,d)=>{const nx=g.x+d.dx*60,ny=g.y+d.dy*60;const dist=Math.hypot(nx-tx,ny-ty);const bd=Math.hypot(best.nx-tx,best.ny-ty);return(d.type==='chase'?dist<bd:dist>bd)?{...d,nx,ny}:best;},{...valid2[0],nx:g.x+valid2[0].dx*60,ny:g.y+valid2[0].dy*60});}
        g.dx=chosen.dx;g.dy=chosen.dy;
      }
      const gspd=g.scared?1:2;
      g.x+=g.dx*gspd; g.y+=g.dy*gspd;
      g.x=((g.x%W)+W)%W;
      // ghost/pac collision
      if(Math.hypot(g.x-pac.x,g.y-pac.y)<20){
        if(g.scared){g.scared=false;score+=200;g.x=14*SZ;g.y=11*SZ;}
        else{lives--;if(lives<=0) state='dead'; else{pac.x=14*SZ;pac.y=16*SZ;pac.dx=1;pac.dy=0;}}
      }
    }
    if(dots.every(d=>d.eaten)){reset();score+=1000;}
    drawMap();
  }
  function drawMap(){
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    // walls
    for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++){
      if(MAP_STR[r][col]==='#'){
        ctx.fillStyle='#001a3a'; ctx.fillRect(col*SZ,r*SZ,SZ,SZ);
        ctx.strokeStyle='#003388'; ctx.lineWidth=1; ctx.strokeRect(col*SZ+.5,r*SZ+.5,SZ-1,SZ-1);
      }
    }
    // dots
    for(const d of dots){
      if(d.eaten) continue;
      ctx.fillStyle='#ffcc88'; ctx.shadowColor='#ffcc88'; ctx.shadowBlur=d.big?10:4;
      ctx.beginPath(); ctx.arc(d.col*SZ+SZ/2,d.r*SZ+SZ/2,d.big?6:3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }
    // ghosts
    for(const g of ghosts){
      ctx.fillStyle=g.scared?'#0044ff':g.col; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=10;
      const gx=g.x,gy=g.y,gr=SZ/2-2;
      ctx.beginPath(); ctx.arc(gx+gr,gy+gr,gr,Math.PI,0); ctx.lineTo(gx+gr*2,gy+SZ-2);
      for(let i=2;i>=0;i--) ctx.lineTo(gx+gr*2/3*i+(i%2?gr*2/3:0),gy+gr+(i%2?gr/2:0));
      ctx.lineTo(gx,gy+gr); ctx.fill(); ctx.shadowBlur=0;
    }
    // pac
    const px=pac.x+SZ/2-2, py=pac.y+SZ/2-2, pr=SZ/2-2;
    const m=Math.abs(Math.sin(mouthA))*0.35;
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=14;
    ctx.beginPath();
    const angle2=Math.atan2(pac.dy,pac.dx);
    ctx.moveTo(px,py);
    ctx.arc(px,py,pr,angle2+m,angle2+Math.PI*2-m);
    ctx.fill(); ctx.shadowBlur=0;
    hud(ctx,score,lives,W);
  }
  reset(); state='start';
  tick();
  const kd=e=>{
    if(state==='start'){state='play';return;}
    if(state==='dead'){score=0;reset();return;}
    const m={ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1}};
    if(m[e.key]){pac.nextDx=m[e.key].x;pac.nextDy=m[e.key].y;e.preventDefault();}
  };
  document.addEventListener('keydown',kd);
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── BREAKOUT ─────────────────────────────────────────────────────────────────
ENGINES.breakout = function(container) {
  const W=700,H=500;
  const c=makeCanvas(W,H,'#030309');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:none';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const ROWS=7,COLS=12,BW=48,BH=16,BR=8,PAD=100;
  const COLORS=['#ff3355','#ff8800','#ffd700','#00ff88','#00d4ff','#aa44ff','#ff44aa'];
  let paddle,ball,bricks,score,lives,state,raf;
  function init(){
    paddle={x:W/2-PAD/2,y:H-40};
    ball={x:W/2,y:H-60,vx:4*(Math.random()>.5?1:-1),vy:-5.5};
    bricks=[];
    for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++)
      bricks.push({x:10+col*(BW+6),y:50+r*(BH+6),alive:true,col:COLORS[r%COLORS.length]});
    score=0;lives=3;state='start';
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#030309';ctx.fillRect(0,0,W,H);drawGame();startMsg(ctx,W,H,'BREAKOUT','Mouse ou ← → · ESPAÇO/Clique para lançar');return;}
    if(state==='dead'){ctx.fillStyle='#030309';ctx.fillRect(0,0,W,H);drawGame();gameOver(ctx,W,H,score,init);return;}
    // input
    if(keys['ArrowLeft']) paddle.x=Math.max(0,paddle.x-8);
    if(keys['ArrowRight']) paddle.x=Math.min(W-PAD,paddle.x+8);
    // ball
    ball.x+=ball.vx; ball.y+=ball.vy;
    if(ball.x-BR<0||ball.x+BR>W) ball.vx*=-1;
    if(ball.y-BR<0) ball.vy*=-1;
    // paddle hit
    if(ball.y+BR>paddle.y&&ball.y+BR<paddle.y+14&&ball.x>paddle.x&&ball.x<paddle.x+PAD){
      ball.vy=-Math.abs(ball.vy); ball.vx+=(ball.x-(paddle.x+PAD/2))*.08;
    }
    if(ball.y>H){lives--;if(lives<=0) state='dead'; else{ball={x:W/2,y:H-60,vx:4*(Math.random()>.5?1:-1),vy:-5.5};state='start';}}
    // bricks
    for(const b of bricks){
      if(!b.alive) continue;
      if(ball.x>b.x&&ball.x<b.x+BW&&ball.y-BR<b.y+BH&&ball.y+BR>b.y){b.alive=false;ball.vy*=-1;score+=10;}
    }
    if(bricks.every(b=>!b.alive)){init();score+=500;}
    drawGame();
  }
  function drawGame(){
    ctx.fillStyle='#030309'; ctx.fillRect(0,0,W,H);
    bricks.forEach(b=>{if(!b.alive) return;ctx.fillStyle=b.col;ctx.shadowColor=b.col;ctx.shadowBlur=5;ctx.fillRect(b.x,b.y,BW,BH);ctx.shadowBlur=0;});
    const pg=ctx.createLinearGradient(paddle.x,0,paddle.x+PAD,0);
    pg.addColorStop(0,'#0066aa');pg.addColorStop(.5,'#00d4ff');pg.addColorStop(1,'#0066aa');
    ctx.fillStyle=pg;ctx.shadowColor='#00d4ff';ctx.shadowBlur=10;ctx.fillRect(paddle.x,paddle.y,PAD,12);ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.shadowColor='#00d4ff';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    hud(ctx,score,lives,W);
  }
  init();
  c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();paddle.x=Math.min(Math.max((e.clientX-r.left)/r.width*W-PAD/2,0),W-PAD);});
  const kd=e=>{if(e.code==='Space'){if(state==='start'||state==='dead') state='play';e.preventDefault();}};
  c.addEventListener('click',()=>{state='play';});
  document.addEventListener('keydown',kd);
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── PONG ─────────────────────────────────────────────────────────────────────
ENGINES.pong = function(container) {
  const W=800,H=500;
  const c=makeCanvas(W,H,'#020210');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const PW=14,PH=90,BALL=10,SPEED=6;
  let p1,p2,ball2,s1,s2,state,raf;
  function reset2(){p1={y:H/2-PH/2};p2={y:H/2-PH/2};ball2={x:W/2,y:H/2,vx:SPEED*(Math.random()>.5?1:-1),vy:(Math.random()*4-2)};s1=0;s2=0;state='play';}
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#020210';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'PONG 2P','W/S = P1 · ↑/↓ = P2');return;}
    if(keys['KeyW']&&p1.y>0) p1.y-=6;
    if(keys['KeyS']&&p1.y<H-PH) p1.y+=6;
    if(keys['ArrowUp']&&p2.y>0) p2.y-=6;
    if(keys['ArrowDown']&&p2.y<H-PH) p2.y+=6;
    ball2.x+=ball2.vx; ball2.y+=ball2.vy;
    if(ball2.y-BALL<0||ball2.y+BALL>H) ball2.vy*=-1;
    if(ball2.x-BALL<26&&ball2.y>p1.y&&ball2.y<p1.y+PH){ball2.vx=Math.abs(ball2.vx)*1.05;ball2.vy+=(ball2.y-(p1.y+PH/2))*.1;}
    if(ball2.x+BALL>W-26&&ball2.y>p2.y&&ball2.y<p2.y+PH){ball2.vx=-Math.abs(ball2.vx)*1.05;ball2.vy+=(ball2.y-(p2.y+PH/2))*.1;}
    if(ball2.x<0){s2++;ball2={x:W/2,y:H/2,vx:SPEED,vy:(Math.random()*4-2)};}
    if(ball2.x>W){s1++;ball2={x:W/2,y:H/2,vx:-SPEED,vy:(Math.random()*4-2)};}
    // draw
    ctx.fillStyle='#020210'; ctx.fillRect(0,0,W,H);
    ctx.setLineDash([10,10]); ctx.strokeStyle='rgba(0,212,255,.2)'; ctx.lineWidth=2;

    [[22,p1.y,'#00d4ff'],[W-22-PW,p2.y,'#ff3355']].forEach(([x,y,col])=>{
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=12; ctx.fillRect(x,y,PW,PH); ctx.shadowBlur=0;
    });
    ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.arc(ball2.x,ball2.y,BALL,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#00d4ff'; ctx.font='bold 2.5rem Orbitron,monospace'; ctx.textAlign='center';
    ctx.fillText(s1,W/4,55); ctx.fillStyle='#ff3355'; ctx.fillText(s2,3*W/4,55);
  }
  state='start';
  const kd=e=>{if(state==='start') state='play';if(['ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();};
  document.addEventListener('keydown',kd);
  c.addEventListener('click',()=>{if(state==='start') reset2();});
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── GEOMETRY DASH ─────────────────────────────────────────────────────────────
ENGINES.geometryDash = function(container) {
  const W=800,H=400;
  const c=makeCanvas(W,H,'#000815');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  const GY=300, CS=40, SPEED=6;
  let cube,obstacles2,score3,speed3,state,raf,camX3;
  function reset(){
    cube={x:100,y:GY-CS,vy:0,onG:true,angle:0};
    obstacles2=[];score3=0;speed3=SPEED;state='start';camX3=0;
    for(let x=400;x<3000;x+=80+Math.random()*120){
      const h=30+Math.random()*80;
      obstacles2.push({x,y:GY-h,w:CS,h,type:'spike'});
    }
  }
  function jump(){
    if(state==='start') state='play';
    else if(state==='dead'){reset();}
    else if(cube.onG){cube.vy=-13;cube.onG=false;}
  }
  function tick(){
    raf=requestAnimationFrame(tick);
    if(state==='start'){ctx.fillStyle='#000815';ctx.fillRect(0,0,W,H);startMsg(ctx,W,H,'GEOMETRY DASH','ESPAÇO / CLIQUE para pular');return;}
    if(state==='dead'){ctx.fillStyle='#000815';ctx.fillRect(0,0,W,H);draw();gameOver(ctx,W,H,Math.floor(score3),reset);return;}
    cube.vy+=0.65; cube.y+=cube.vy;
    cube.angle+=0.08;
    if(cube.y>=GY-CS){cube.y=GY-CS;cube.vy=0;cube.onG=true;cube.angle=Math.round(cube.angle/(Math.PI/2))*(Math.PI/2);}
    camX3=cube.x-100;
    score3+=speed3*0.04;
    // obstacles collision
    for(const o of obstacles2){
      if(cube.x+CS-5>o.x&&cube.x+5<o.x+o.w&&cube.y+CS-4>o.y){state='dead';return;}
    }
    draw();
  }
  function draw(){
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#000815'); grad.addColorStop(1,'#001030');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle='#001a3a'; ctx.fillRect(0,GY,W,H-GY);
    ctx.fillStyle='#00d4ff'; ctx.fillRect(0,GY,W,3);
    // obstacles
    obstacles2.forEach(o=>{
      const ox=o.x-camX3;
      if(ox<-50||ox>W+50) return;
      ctx.fillStyle='#ff3355'; ctx.shadowColor='#ff3355'; ctx.shadowBlur=8;
      // spike
      ctx.beginPath(); ctx.moveTo(ox+o.w/2,o.y); ctx.lineTo(ox,GY); ctx.lineTo(ox+o.w,GY); ctx.fill();
      ctx.shadowBlur=0;
    });
    // cube
    ctx.save(); ctx.translate(cube.x-camX3+CS/2,cube.y+CS/2); ctx.rotate(cube.angle);
    ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=14;
    ctx.fillRect(-CS/2,-CS/2,CS,CS);
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=2;
    ctx.strokeRect(-CS/2+3,-CS/2+3,CS-6,CS-6);
    ctx.shadowBlur=0; ctx.restore();
    hud(ctx,Math.floor(score3),null,W);
  }
  reset();
  const kd=e=>{if(e.code==='Space'||e.code==='ArrowUp'){jump();e.preventDefault();}};
  document.addEventListener('keydown',kd);
  c.addEventListener('click',jump);
  tick();
  return()=>{cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);};
};

// ── MINESWEEPER ───────────────────────────────────────────────────────────────
ENGINES.minesweeper = function(container) {
  const ROWS=14,COLS=18,MINES2=35,CS2=34;
  const W=COLS*CS2, H=ROWS*CS2+48;
  const c=makeCanvas(W,H,'#050510');
  c.style.cssText='width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;cursor:pointer';
  container.appendChild(c);
  const ctx=c.getContext('2d');
  let grid2,started2,over2,flagCount,raf;
  function newGrid2(){return Array.from({length:ROWS},()=>Array.from({length:COLS},()=>({mine:false,rev:false,flag:false,adj:0})));}
  function placeMines2(sr,sc){let pl=0;while(pl<MINES2){const r=Math.floor(Math.random()*ROWS),col=Math.floor(Math.random()*COLS);if(!grid2[r][col].mine&&!(Math.abs(r-sr)<=1&&Math.abs(col-sc)<=1)){grid2[r][col].mine=true;pl++;}}
    for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++)if(!grid2[r][col].mine){let a=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=col+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&grid2[nr][nc].mine)a++;}grid2[r][col].adj=a;}}
  function reveal2(r,col){if(r<0||r>=ROWS||col<0||col>=COLS||grid2[r][col].rev||grid2[r][col].flag) return;grid2[r][col].rev=true;if(!grid2[r][col].adj&&!grid2[r][col].mine)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal2(r+dr,col+dc);}
  function init2(){grid2=newGrid2();started2=false;over2=false;flagCount=0;draw2();}
  const AC=['','#00d4ff','#00ff88','#ff3355','#aa44ff','#ff8800','#00ffcc','#ff44aa','#fff'];
  function draw2(){
    ctx.fillStyle='#050510'; ctx.fillRect(0,0,W,H+48);
    // HUD
    ctx.fillStyle='#00d4ff'; ctx.font='bold 14px Orbitron,monospace'; ctx.textAlign='left';
    ctx.fillText(`💣 ${MINES2-flagCount}`,10,30);
    ctx.textAlign='center'; ctx.fillStyle=over2?'#ff3355':'#ffd700';
    ctx.fillText(over2?(grid2.flat().filter(c=>!c.mine).every(c=>c.rev)?'🏆 GANHOU!':'💥 BOOM! Clique para reiniciar'):'Clique para revelar · Direito = Bandeira',W/2,30);
    // cells
    for(let r=0;r<ROWS;r++)for(let col2=0;col2<COLS;col2++){
      const cell=grid2[r][col2], x=col2*CS2, y=r*CS2+42;
      ctx.fillStyle=cell.rev?(cell.mine?'#330011':'#0d1a2a'):'#111a2a';
      ctx.fillRect(x+1,y+1,CS2-2,CS2-2);
      ctx.strokeStyle='rgba(0,212,255,.1)'; ctx.strokeRect(x+1,y+1,CS2-2,CS2-2);
      if(cell.flag){ctx.font=(CS2*.7)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🚩',x+CS2/2,y+CS2/2);}
      else if(cell.rev){
        if(cell.mine){ctx.fillStyle='#ff0044';ctx.beginPath();ctx.arc(x+CS2/2,y+CS2/2,CS2*.3,0,Math.PI*2);ctx.fill();}
        else if(cell.adj){ctx.fillStyle=AC[cell.adj];ctx.font=`bold ${CS2*.5}px Orbitron,monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(cell.adj,x+CS2/2,y+CS2/2);}
      }
    }
    ctx.textBaseline='alphabetic';
  }
  init2();
  c.addEventListener('click',e=>{
    if(over2){init2();return;}
    const rect=c.getBoundingClientRect();
    const col2=Math.floor((e.clientX-rect.left)/rect.width*W/CS2);
    const r=Math.floor(((e.clientY-rect.top)/rect.height*H-42)/CS2);
    if(r<0||r>=ROWS||col2<0||col2>=COLS) return;
    if(!started2){placeMines2(r,col2);started2=true;}
    if(grid2[r][col2].flag) return;
    reveal2(r,col2);
    if(grid2[r][col2].mine) over2=true;
    else if(grid2.flat().filter(cc=>!cc.mine).every(cc=>cc.rev)) over2=true;
    draw2();
  });
  c.addEventListener('contextmenu',e=>{
    e.preventDefault(); if(over2||!started2) return;
    const rect=c.getBoundingClientRect();
    const col2=Math.floor((e.clientX-rect.left)/rect.width*W/CS2);
    const r=Math.floor(((e.clientY-rect.top)/rect.height*H-42)/CS2);
    if(r<0||r>=ROWS||col2<0||col2>=COLS||grid2[r][col2].rev) return;
    grid2[r][col2].flag=!grid2[r][col2].flag;
    flagCount+=grid2[r][col2].flag?1:-1; draw2();
  });
  raf=requestAnimationFrame(()=>{});
  return()=>{cancelAnimationFrame(raf);};
};

ENGINES.simonSays = function(container) {
  const wrap=document.createElement('div');

  title.style.cssText='font-family:Orbitron,monospace;color:#00d4ff;font-size:1.2rem;letter-spacing:.15em';
  title.textContent='SIMON SAYS';
  const scoreEl2=document.createElement('div');
  scoreEl2.style.cssText='font-family:Orbitron,monospace;color:#ffd700;font-size:.9rem;letter-spacing:.12em';
  const board2=document.createElement('div');
  board2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(280px,80vw)';
  const msg2=document.createElement('div');
  msg2.style.cssText='font-family:Rajdhani,sans-serif;color:#7a92aa;font-size:.9rem;letter-spacing:.08em;min-height:1.2em;text-align:center';
  wrap.append(title,scoreEl2,board2,msg2);
  container.appendChild(wrap);
  const COLORS2=['#ff3355','#00ff88','#ffd700','#00d4ff'];
  const NAMES=['🔴','🟢','🟡','🔵'];
  let seq=[],userSeq,playing,score4=0;
  const btns=COLORS2.map((col,i)=>{
    const btn=document.createElement('div');
    btn.style.cssText=`background:${col}22;border:2px solid ${col}44;border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:2.5rem;cursor:pointer;transition:all .12s;user-select:none`;
    btn.textContent=NAMES[i];
    btn.onclick=()=>userClick(i);
    board2.appendChild(btn);
    return btn;
  });
  function flash(i,ms=400){
    btns[i].style.background=COLORS2[i]+'cc';
    btns[i].style.boxShadow=`0 0 24px ${COLORS2[i]}`;
    setTimeout(()=>{btns[i].style.background=COLORS2[i]+'22';btns[i].style.boxShadow='';},ms);
  }
  async function showSeq(){
    playing=false; msg2.textContent='Observe...';
    for(const s of seq){await sleep(600);flash(s,500);await sleep(550);}
    msg2.textContent='Sua vez!'; userSeq=[]; playing=true;
  }
  function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
  async function userClick(i){
    if(!playing) return;
    flash(i,200);
    userSeq.push(i);
    const idx=userSeq.length-1;
    if(userSeq[idx]!==seq[idx]){score4=0;seq=[];msg2.textContent='❌ Errou! Clique para reiniciar';playing=false;scoreEl2.textContent='SCORE: 0';return;}
    if(userSeq.length===seq.length){score4++;scoreEl2.textContent='SCORE: '+score4;await sleep(800);seq.push(Math.floor(Math.random()*4));showSeq();}
  }
  msg2.textContent='Clique para iniciar';
  wrap.addEventListener('click',e=>{if(!playing&&seq.length===0){seq.push(Math.floor(Math.random()*4));showSeq();}
    else if(!playing&&seq.length>0){seq=[Math.floor(Math.random()*4)];score4=0;scoreEl2.textContent='SCORE: 0';showSeq();}
  },{capture:false});
};
