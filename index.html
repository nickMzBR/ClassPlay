<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassPlay | Games Dashboard</title>
    <style>
        :root {
            --bg: #111;
            --card-bg: #222;
            --accent: #00a2ff;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 30px 0;
            background: #1a1a1a;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        h1 span { color: var(--accent); }

        .search-box {
            margin-top: 15px;
            width: 80%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #000;
            color: white;
            outline: none;
        }

        .search-box:focus { border-color: var(--accent); }

        .container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 40px 0;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.3);
        }

        .game-card span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .game-card h3 { margin: 0; font-size: 1rem; color: #ccc; }

        .counter { font-size: 0.8rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>CLASS<span>PLAY</span></h1>
        <input type="text" id="search" class="search-box" placeholder="Pesquisar entre +300 jogos..." onkeyup="filter()">
        <div class="counter" id="game-count">Carregando jogos...</div>
    </header>

    <div class="container" id="grid">
        </div>

    <script>
        // LISTA DE JOGOS (Expanda até 300)
        // Dica: Use repositórios do GitHub (3kh0, ubg77, etc)
        const games = [
            { n: "Slope", u: "https://ubg77.github.io/edit/slope/", i: "🏀" },
            { n: "1v1.LOL", u: "https://1v1.lol/", i: "🔫" },
            { n: "Minecraft Classic", u: "https://classic.minecraft.net/", i: "🧱" },
            { n: "Retro Bowl", u: "https://game316009.hostman.site/", i: "🏈" },
            { n: "Gartic.io", u: "https://gartic.io/", i: "✏️" },
            { n: "Subway Surfers", u: "https://games-online.io/game/subway-surfers/", i: "🏃" },
            { n: "Bitlife", u: "https://bitlifeonline.io/", i: "👶" },
            { n: "Cookie Clicker", u: "https://orteil.dashnet.org/cookieclicker/", i: "🍪" },
            { n: "Paper.io 2", u: "https://paper-io.com/", i: "📄" },
            { n: "Doodle Jump", u: "https://doodlejump.io/", i: "🚀" },
            { n: "Friday Night Funkin", u: "https://ninja-muffin24.itch.io/funkin", i: "🎤" },
            { n: "Eaglercraft", u: "https://eaglercraft.com/mc/1.8.8/", i: "⛏️" },
            { n: "Bottle Flip 3D", u: "https://bottledflip.com/", i: "🍾" },
            { n: "Tetris", u: "https://tetris.com/play-tetris", i: "🕹️" },
            { n: "Among Us", u: "https://amongusplay.online/", i: "🚀" },
            // Para chegar em 300, duplique e altere os nomes/links abaixo:
        ];

        // FUNÇÃO HACKER: INJETAR EM ABOUT:BLANK
        function openGame(url) {
            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert("Permita pop-ups para jogar unblocked!");
                return;
            }
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            const iframe = win.document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(g => `
                <div class="game-card" onclick="openGame('${g.u}')">
                    <span>${g.i}</span>
                    <h3>${g.n}</h3>
                </div>
            `).join('');
            document.getElementById('game-count').innerText = `${list.length} Jogos Disponíveis`;
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            const filtered = games.filter(g => g.n.toLowerCase().includes(val));
            render(filtered);
        }

        // Iniciar
        render(games);
    </script>
</body>
</html>
