<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassPlay | Unblocked</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #151515;
            --accent: #00d1ff;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 30px 0;
            background: #111;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        h1 span { color: var(--accent); }

        .search-box {
            margin-top: 15px;
            width: 80%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid #333;
            background: #000;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 209, 255, 0.2); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding: 40px 0;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #222;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: #1a1a1a;
        }

        .card .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .card h3 { margin: 0; font-size: 0.9rem; color: #eee; }
    </style>
</head>
<body>

    <header>

        ];

        function openGame(url) {
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("Habilite pop-ups!");
            
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            const iframe = win.document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.src = url;
            
            win.document.body.appendChild(iframe);
        }

        function render(list) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = list.map(g => `
                <div class="card" onclick="openGame('${g.u}')">
                    <span class="icon">${g.i}</span>
                    <h3>${g.n}</h3>
                </div>
            `).join('');
        }

        function filter() {
            const query = document.getElementById('search').value.toLowerCase();
            render(games.filter(g => g.n.toLowerCase().includes(query)));
        }

        render(games);
    </script>
