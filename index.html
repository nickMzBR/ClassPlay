<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Estudos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #222;
            color: #00d4ff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra Superior Estilizada */
        .header {
            background-color: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #00d4ff;
            z-index: 100;
        }

        .logo {
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .search-bar {
            flex-grow: 1;
            display: flex;
            gap: 5px;
        }

        input {
            flex-grow: 1;
            padding: 8px 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            outline: none;
        }

        input:focus { border-color: #00d4ff; }

        button {
            padding: 8px 15px;
            background: #00d4ff;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Área do Proxy */
        #content-container {
            flex-grow: 1;
            width: 100%;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #fff;
        }

        .status {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">WEB<span>CORE</span></div>
        <div class="search-bar">
            <input type="text" id="url-input" placeholder="Digite a URL ou pesquise..." autocomplete="off">
            <button onclick="launch()">ACESSAR</button>
        </div>
    </div>

    <div id="content-container">
        <div id="msg" class="status">
            <h2>PRONTO PARA CONEXÃO</h2>
            <p style="color: #666; margin-top: 5px;">Aguardando entrada de dados...</p>
        </div>
        <iframe id="proxy-frame"></iframe>
    </div>

    <script>
        const input = document.getElementById('url-input');
        const frame = document.getElementById('proxy-frame');
        const msg = document.getElementById('msg');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') launch();
        });

        function launch() {
            let val = input.value.trim();
            if (!val) return;

            // Formata a URL (se não tem ponto, vira pesquisa no Google)
            let target;
            if (!val.includes('.') || val.includes(' ')) {
                target = 'https://www.google.com/search?q=' + encodeURIComponent(val);
            } else {
                target = val.startsWith('http') ? val : 'https://' + val;
            }

            // Usando um gateway alternativo para evitar o erro do Croxy
            const proxyUrl = "https://t.me/s/proxy?url=" + encodeURIComponent(target); 
            // Para um funcionamento mais robusto em um arquivo só, 
            // o ideal é redirecionar o SRC para um serviço de "web mirror"
            
            msg.style.display = 'none';
            frame.style.display = 'block';
            
            // Link direto do motor de processamento
            frame.src = "https://www.google.com/search?igu=1&q=" + encodeURIComponent(val);
            
            // Se o Google bloquear o iframe simples, usamos o Croxy de forma correta:
            frame.src = "https://www.croxyproxy.com/_proxy/php?url=" + encodeURIComponent(target);
        }
    </script>
</body>
</html>
